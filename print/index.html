<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portal Genesis – Mestre</title>
<link rel="stylesheet" href="style.css"/>
<style>
:root {
  --bg:#060913; --panel:#0d1425; --text:#eef3ff;
  --gold:#d8b46f; --cyan:#6ee7df; --green:#78e2a2;
  --purple:#b99cff; --shadow:0 28px 90px rgba(0,0,0,.48); --radius:22px;
}
/* CSS integrado para responsividade e nodes */
body,html{height:100%;margin:0;padding:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
button,input,textarea,select{font:inherit}button{cursor:pointer}.hidden{display:none!important;}
#dashboard{display:grid;grid-template-columns:1fr 3fr 1fr;height:100vh;}
@media(max-width:768px){#dashboard{grid-template-columns:1fr;grid-template-rows:auto 1fr auto;}#leftDock,#rightDock{position:fixed;bottom:0;width:100%;max-height:50%;overflow-y:auto;}}
.frame{width:100%;height:100%;border:none;display:none;}
.frame.active{display:block;}
</style>
</head>
<body>

<!-- Login -->
<section id="login" class="login">
  <div class="loginCard pgAccess">
    <div class="pgMark">PG</div>
    <div class="brandMini">Portal Genesis</div>
    <h1>Acesso Oficial</h1>
    <div class="field"><label>Usuário</label><input id="user" autocomplete="username" placeholder="seu acesso"></div>
    <div class="field"><label>Senha</label><input id="pass" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <div id="err" class="err">Acesso não autorizado.</div>
    <button class="btn gold" style="width:100%" onclick="login()">Entrar no Portal Genesis</button>
  </div>
</section>

<!-- Dashboard -->
<section id="app" class="app hidden">
  <header class="topbar">
    <div class="logo">PG</div>
    <div class="tabs">
      <button id="tab-portal" class="tab active" onclick="showTab('portal')">Portal</button>
      <button id="tab-studio" class="tab" onclick="showTab('studio')">Studio Lab</button>
      <button id="tab-video" class="tab" onclick="showTab('video')">Video Remotion</button>
      <button id="tab-print" class="tab" onclick="showTab('print')">Print Remotion</button>
      <button id="tab-vitrine" class="tab" onclick="showTab('vitrine')">Vitrine PG</button>
      <button id="tab-api" class="tab" onclick="showTab('api')">API / Config</button>
      <button class="btn red small" onclick="logout()">Sair</button>
    </div>
  </header>

  <main id="dashboard">
    <!-- Left Dock -->
    <aside id="leftDock">
      <h3>Pipeline / Nodes</h3>
      <ul id="nodeList"></ul>
    </aside>

    <!-- Central frames -->
    <div id="canvasArea">
      <iframe id="frame-portal" class="frame active" src="./portal/index.html"></iframe>
      <iframe id="frame-studio" class="frame" src="./studio/index.html"></iframe>
      <iframe id="frame-video" class="frame" src="./video/index.html"></iframe>
      <iframe id="frame-print" class="frame" src="./print/index.html"></iframe>
      <div id="minimap">Minimapa</div>
    </div>

    <!-- Right Dock -->
    <aside id="rightDock">
      <div id="station">Estação do Node: selecione um node</div>
      <div id="preview">Preview leve</div>
      <div id="package">Pacote final (TXT/JSON)</div>
    </aside>
  </main>
</section>

<script>
const $ = id=>document.getElementById(id);

async function verify(){
  try{
    const r = await fetch('/api/auth-verify');
    if(r.ok){$('login').classList.add('hidden');$('app').classList.remove('hidden');showTab('portal');}
  }catch(e){}
}

async function login(){
  $('err').classList.remove('show');
  try{
    const r = await fetch('/api/auth-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:$('user').value,password:$('pass').value})});
    if(!r.ok) throw new Error('login');
    $('login').classList.add('hidden');$('app').classList.remove('hidden');showTab('portal');
  }catch(e){$('err').classList.add('show');}
}

function logout(){
  $('app').classList.add('hidden');$('login').classList.remove('hidden');$('pass').value='';
}

function hideAll(){
  ['portal','studio','video','print','vitrine','api'].forEach(n=>{$('frame-'+n)?.classList.remove('active');});
}

function showTab(name){
  hideAll();$('frame-'+name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.id==='tab-'+name));
}

// Nodes
let nodes=[];const nodeList=$('nodeList');
function addNode(){const id=nodes.length+1;nodes.push({id});const li=document.createElement('li');li.id='node-'+id;li.className='node';li.textContent='Node '+id;li.onclick=()=>openStation(id);nodeList.appendChild(li);}
function openStation(id){$('station').textContent='Node '+id+' selecionado';}
function exportPackage(){alert('Pacote exportado!');}

// Responsividade touch/drag/zoom placeholders
const canvasArea=$('canvasArea');canvasArea.addEventListener('touchstart',e=>{});canvasArea.addEventListener('touchmove',e=>{});canvasArea.addEventListener('mousedown',e=>{});canvasArea.addEventListener('mousemove',e=>{});

verify();
</script>
</body>
</html>
