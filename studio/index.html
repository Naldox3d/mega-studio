<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio Remotion Lab – Portal Genesis</title>
<link rel="stylesheet" href="style.css" />
<style>
:root {
  --bg:#060913; --panel:#0d1425; --text:#eef3ff; --gold:#d8b46f; --cyan:#6ee7df;
  --green:#78e2a2; --purple:#b99cff; --shadow:0 28px 90px rgba(0,0,0,.48); --radius:22px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;}
#studioCanvas{display:grid;grid-template-columns:1fr 3fr 1fr;height:100vh;}
#topbar{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--panel);box-shadow:var(--shadow);}
#leftDock,#rightDock{background:var(--panel);padding:10px;overflow-y:auto;}
#canvasArea{background:var(--bg);position:relative;overflow:hidden;}
.node{background:var(--panel3);padding:8px;border-radius:var(--radius);box-shadow:var(--shadow);margin:5px;cursor:pointer;}
#minimap{position:absolute;bottom:10px;right:10px;width:150px;height:100px;background:var(--panel2);border-radius:8px;opacity:0.8;overflow:hidden;}
@media (max-width:768px){
  #studioCanvas{grid-template-columns:1fr;grid-template-rows:auto 1fr auto;}
  #leftDock,#rightDock{position:fixed;bottom:0;width:100%;max-height:50%;overflow-y:auto;}
}
</style>
</head>
<body>

<div id="studioCanvas">
  <!-- Topbar -->
  <div id="topbar">
    <div id="logo">PG Studio</div>
    <div id="projectStatus">Projeto: Inativo | Nodes: 0/0</div>
    <div id="actions">
      <button onclick="addNode()">Novo Node</button>
      <button onclick="exportPackage()">Exportar Pacote</button>
    </div>
  </div>

  <!-- Left Dock -->
  <div id="leftDock">
    <h3>Pipeline / Nodes</h3>
    <ul id="nodeList"></ul>
  </div>

  <!-- Canvas -->
  <div id="canvasArea">
    <svg id="connections" style="position:absolute;top:0;left:0;width:100%;height:100%;"></svg>
    <div id="minimap">Minimap</div>
  </div>

  <!-- Right Dock -->
  <div id="rightDock">
    <h3>Estação do Node</h3>
    <div id="station">
      <p>Selecione um node para editar</p>
      <label>Briefing</label><textarea id="briefing"></textarea>
      <label>API / Flux</label><input id="nodeAPI"/>
      <label>Story / Cena</label><textarea id="story"></textarea>
      <label>Motion</label><input id="motion"/>
      <label>Prompts</label><textarea id="prompts"></textarea>
      <label>SRT / CapCut</label><input id="srt"/>
      <button onclick="saveNode()">Salvar Node</button>
    </div>
  </div>
</div>

<script>
// ------------------- Setup Nodes -------------------
let nodes = [];
const nodeList = document.getElementById('nodeList');
const projectStatus = document.getElementById('projectStatus');

function addNode(){
  const id = nodes.length+1;
  const node = {id:id, briefing:'', story:'', api:'', motion:'', prompts:'', srt:''};
  nodes.push(node);
  const li = document.createElement('li');
  li.id = 'node-'+id;
  li.className = 'node';
  li.textContent = 'Node '+id;
  li.onclick = ()=>openStation(id);
  nodeList.appendChild(li);
  updateStatus();
}

function openStation(id){
  const node = nodes.find(n=>n.id===id);
  document.getElementById('briefing').value = node.briefing;
  document.getElementById('story').value = node.story;
  document.getElementById('nodeAPI').value = node.api;
  document.getElementById('motion').value = node.motion;
  document.getElementById('prompts').value = node.prompts;
  document.getElementById('srt').value = node.srt;
}

function saveNode(){
  const id = parseInt(document.getElementById('briefing').dataset.nodeId);
  const node = nodes.find(n=>n.id===id);
  if(!node) return;
  node.briefing = document.getElementById('briefing').value;
  node.story = document.getElementById('story').value;
  node.api = document.getElementById('nodeAPI').value;
  node.motion = document.getElementById('motion').value;
  node.prompts = document.getElementById('prompts').value;
  node.srt = document.getElementById('srt').value;
  alert('Node '+id+' salvo!');
}

function updateStatus(){
  projectStatus.textContent = `Projeto: Ativo | Nodes: ${nodes.length}/${nodes.length}`;
}

// Placeholder para exportar pacote
function exportPackage(){
  alert('Pacote exportado! (JSON/TXT)');
}

// ------------------- Responsividade / touch -------------------
const canvasArea = document.getElementById('canvasArea');
canvasArea.addEventListener('touchstart', e=>{});
canvasArea.addEventListener('touchmove', e=>{});
canvasArea.addEventListener('mousedown', e=>{});
canvasArea.addEventListener('mousemove', e=>{});

// ------------------- Integração IA / Flux / GPT Image 2 -------------------
async function generateImage(nodeId){
  // Placeholder para chamada Pollinations Flux ou GPT Image 2
  console.log('Gerando imagem para node', nodeId);
}

// ------------------- ElevenLabs TTS placeholder -------------------
async function generateAudio(text){
  // Placeholder para chamada ElevenLabs TTS gratuita
  console.log('Gerando áudio ElevenLabs:', text);
}
</script>
</body>
</html>
