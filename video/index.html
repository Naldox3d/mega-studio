<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Video Pack Studio — Titan Colossal V2.0 Canvas Inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#070a12;
    --panel:#0d1220;
    --panel2:#111827;
    --line:rgba(255,255,255,.10);
    --gold:#d6ad68;
    --cyan:#65d9d2;
    --green:#74d99a;
    --red:#e18a8a;
    --purple:#b99cff;
    --text:#e8ecf4;
    --muted:#9aa4b8;
    --blue:#5aa9ff;
    --locked:#6b7280;
    --orange:#e8b766;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}
body{
    background:radial-gradient(circle at 80% 8%,rgba(214,173,104,.10),transparent 25%),
               radial-gradient(circle at 12% 18%,rgba(101,217,210,.07),transparent 25%),
               linear-gradient(180deg,#070a12,#090d18 55%,#070a12);
    overflow: hidden; /* Controlado pelo JS no modo canvas */
}
button,input,textarea,select{font:inherit}button{cursor:pointer}

/* Topbar */
.topbar{
    position:sticky;top:0;z-index:20;display:flex;gap:12px;align-items:center;
    padding:14px 18px;background:rgba(7,10,18,.94);border-bottom:1px solid var(--line);
    backdrop-filter:blur(10px);
    transition: transform 0.3s ease-out;
}
.brand{font-family:Syne,sans-serif;font-weight:900;font-size:18px;color:#eadcc1;letter-spacing:.04em}
.brand small{font-family:Space Mono,monospace;color:var(--gold);font-size:10px;margin-left:8px}
.nav{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}

/* Buttons */
.btn{
    border:1px solid var(--line);border-radius:12px;background:var(--panel2);color:var(--text);
    padding:9px 13px;font-size:12px;font-weight:800;text-decoration:none;display:inline-flex;
    gap:6px;align-items:center;justify-content:center;
    transition: all 0.2s ease;
}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
.btn.gold{background:linear-gradient(180deg,#e1bc7b,#c89a55);color:#1a1203;border-color:rgba(214,173,104,.65)}
.btn.green{background:linear-gradient(180deg,#83dda9,#61c78c);color:#07140d;border-color:rgba(116,217,154,.65)}
.btn.cyan{background:rgba(101,217,210,.10);border-color:rgba(101,217,210,.35);color:#cafffb}
.btn.purple{background:rgba(185,156,255,.10);border-color:rgba(185,156,255,.35);color:#eadcff}
.btn.red{background:rgba(225,138,138,.10);border-color:rgba(225,138,138,.35);color:#ffd5d5}

/* Layout Geral */
.shell{display:grid;grid-template-columns:270px minmax(0,1fr);min-height:calc(100vh - 64px)}
.side{border-right:1px solid var(--line);background:#0b1020;padding:14px;overflow:auto}
.side h4{font-size:10px;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;margin:16px 0 8px}
.step{width:100%;text-align:left;border:1px solid var(--line);border-radius:13px;padding:10px 11px;margin-bottom:8px;background:rgba(255,255,255,.025);font-size:12px;color:var(--text)}
.step.active{border-color:rgba(214,173,104,.70);background:rgba(214,173,104,.10);box-shadow:0 0 0 1px rgba(214,173,104,.10) inset}
.step:hover{filter:brightness(1.09)}
.main{padding:22px;overflow:auto}
.hero,.card{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015)),var(--panel);padding:18px;margin-bottom:14px}
.kicker{display:inline-flex;padding:5px 9px;border:1px solid rgba(101,217,210,.32);border-radius:999px;color:#baf7f2;background:rgba(101,217,210,.08);font:10px Space Mono,monospace;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
h1,h2,h3{font-family:Syne,sans-serif;margin:0;color:#eadcc1;letter-spacing:.04em}
h1{font-size:clamp(28px,3vw,44px);line-height:1}
h2{font-size:22px;margin-bottom:12px}
p{color:#bac3d8;line-height:1.6}
.grid{display:grid;gap:14px}
.two{grid-template-columns:repeat(2,minmax(0,1fr))}
.three{grid-template-columns:repeat(3,minmax(0,1fr))}
label{display:block;color:var(--gold);font-size:10px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;margin:10px 0 7px}
input,textarea,select{
    width:100%;border:1px solid var(--line);border-radius:12px;background:#0b1020;
    color:var(--text);padding:10px 12px;outline:none;
    transition: border-color 0.2s ease;
}
input:focus,textarea:focus,select:focus{border-color:var(--gold);}
textarea{min-height:110px;resize:vertical;line-height:1.55}
.output{white-space:pre-wrap;background:#080c17;border:1px solid var(--line);border-radius:14px;padding:14px;min-height:250px;font:12px/1.7 Space Mono,monospace;color:#dbe5ff;overflow:auto}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.notice{border:1px solid rgba(101,217,210,.25);background:rgba(101,217,210,.07);color:#baf7f2;border-radius:14px;padding:11px 13px;font-size:12px;line-height:1.55;margin:12px 0}
.provider{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.provider button.active{border-color:var(--gold);background:rgba(214,173,104,.10);color:#f0d29b}
.mini{font-size:11px;color:var(--muted);font-family:Space Mono,monospace}
.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:10px;color:var(--muted);margin:3px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.tab{border:1px solid var(--line);border-radius:999px;padding:8px 11px;background:#101729;color:#c9d4ee;font-size:12px;font-weight:900}
.tab.active{background:rgba(214,173,104,.13);border-color:rgba(214,173,104,.55);color:#f1d49d}
.screen{display:none}.screen.active{display:block}

/* Preview Stage */
.preview{min-height:360px;border:1px solid var(--line);border-radius:18px;background:#050813;overflow:hidden;position:relative;display:grid;place-items:center}
.stage{width:min(320px,75vw);aspect-ratio:9/16;border:1px solid rgba(255,255,255,.16);border-radius:22px;background:linear-gradient(160deg,#111827,#070a12);position:relative;overflow:hidden;box-shadow:0 20px 70px rgba(0,0,0,.35)}
.stage .orb{position:absolute;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(101,217,210,.40),transparent 62%);left:-50px;top:70px;animation:float 5s infinite alternate ease-in-out}
.stage .orb2{position:absolute;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(214,173,104,.30),transparent 65%);right:-90px;bottom:90px;animation:float2 6s infinite alternate ease-in-out}
.stage .title{position:absolute;left:22px;right:22px;top:34%;font-family:Syne,sans-serif;font-size:28px;line-height:1.05;color:#eadcc1;animation:push 3.5s infinite ease-in-out}
.stage .sub{position:absolute;left:22px;right:22px;top:54%;font-size:13px;color:#cde8ff;line-height:1.4}
.stage .cta{position:absolute;left:22px;right:22px;bottom:38px;text-align:center;border-radius:999px;background:var(--gold);color:#1a1203;padding:10px;font-weight:900}
@keyframes float{from{transform:translate(0,0) scale(1)}to{transform:translate(55px,-20px) scale(1.12)}}
@keyframes float2{from{transform:translate(0,0) scale(1)}to{transform:translate(-35px,30px) scale(1.12)}}
@keyframes push{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.035)}}

/* Result Hub */
.resultHub{border-color:rgba(101,217,210,.20);background:linear-gradient(180deg,rgba(101,217,210,.045),rgba(255,255,255,.015)),var(--panel)}
.hubHead{display:flex;gap:12px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}
.section-card{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.025);padding:12px;min-height:170px}
.section-head{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-head h3{font-size:15px;color:#eadcc1}
.section-body{white-space:pre-wrap;background:#080c17;border:1px solid var(--line);border-radius:12px;padding:12px;min-height:120px;max-height:260px;overflow:auto;font:11px/1.6 Space Mono,monospace;color:#dbe5ff}
.result-tools{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.tiny{font-size:10px;padding:7px 9px;border-radius:10px}

/* Titan Colossal V1 — Briefing Mestre + Árvore Real */
.creatorLine{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px;color:#cbd5e1;font-size:13px;line-height:1.55}
.creatorLine strong{color:#eadcc1}
.creatorSeal{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(214,173,104,.35);background:rgba(214,173,104,.08);color:#f4ddb2;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:900}
.authorLink{border-color:rgba(214,173,104,.45);background:rgba(214,173,104,.08);color:#f3d9a4}
.modalBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.68);display:none;align-items:center;justify-content:center;z-index:80;padding:20px}
.modalBackdrop.open{display:flex}
.authorModal{width:min(760px,96vw);max-height:90vh;overflow:auto;border:1px solid rgba(214,173,104,.35);border-radius:24px;background:linear-gradient(180deg,rgba(214,173,104,.08),rgba(255,255,255,.025)),#0d1220;box-shadow:0 30px 90px rgba(0,0,0,.55);padding:22px}
.authorModal h2{font-size:28px;margin-bottom:8px}
.authorGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.authorCard{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.035);padding:14px}
.authorCard h3{font-size:14px;margin-bottom:8px}
.authorCard p{font-size:13px;margin:0}
.creditText{white-space:pre-wrap;background:#080c17;border:1px solid var(--line);border-radius:16px;padding:14px;font:12px/1.7 Space Mono,monospace;color:#dbe5ff}
.modalActions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}
.masterMatrix{border:1px solid rgba(214,173,104,.24);background:rgba(214,173,104,.045);border-radius:16px;padding:12px;margin-top:12px}
.masterMatrix h3{font-size:15px;margin-bottom:4px}
.masterHint{font-size:12px;color:#cbd5e1;margin:0 0 8px}
.masterBadge{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(101,217,210,.35);background:rgba(101,217,210,.08);color:#cafffb;border-radius:999px;padding:6px 9px;font-size:10px;font-weight:900;margin:3px 4px 0 0}

/* Mind Shell (Canvas Mode) */
.mindShell{min-height:70vh}
.mindHero{
    border-color:rgba(214,173,104,.28);
    background:linear-gradient(180deg,rgba(214,173,104,.075),rgba(101,217,210,.03)),var(--panel);
    transition: all 0.3s ease-out;
}
.mindTitleLine{display:flex;gap:12px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap}
.eggTerminal{display:flex;gap:12px;align-items:center;border:1px solid rgba(101,217,210,.30);background:rgba(5,8,19,.62);border-radius:18px;padding:12px;min-width:min(420px,100%)}
.eggFace{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;background:radial-gradient(circle at 35% 25%,#fff6d9,#d6ad68 70%);font-size:30px;box-shadow:0 10px 40px rgba(214,173,104,.18)}
.eggTerminal strong{color:#eadcc1;display:block}
.eggTerminal span{font-size:12px;color:#b9c4da}
.progressFlow{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin:14px 0}
.progressStep{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.025);padding:10px;display:flex;gap:9px;align-items:center;min-height:58px}
.progressStep .num{width:26px;height:26px;border-radius:999px;display:grid;place-items:center;font-weight:900;font-size:12px;background:#182036;color:#dbe5ff;border:1px solid var(--line)}
.progressStep.done{border-color:rgba(116,217,154,.45);background:rgba(116,217,154,.08)}
.progressStep.done .num{background:var(--green);color:#07140d}
.progressStep.activeFlow{border-color:rgba(214,173,104,.65);background:rgba(214,173,104,.10)}
.progressStep.activeFlow .num{background:var(--gold);color:#1a1203}
.progressStep.wait{opacity:.72}
.progressStep strong{display:block;font-size:11px}
.progressStep span{font-size:10px;color:var(--muted)}

/* Node Viewport (Canvas) */
.nodeViewport{
    position:relative;
    min-height:620px; /* Ajustado para ser mais flexível */
    height: calc(100vh - 200px); /* Altura dinâmica */
    border:1px solid var(--line);
    border-radius:22px;
    background:radial-gradient(circle at 22% 20%,rgba(101,217,210,.08),transparent 22%),
               radial-gradient(circle at 74% 35%,rgba(214,173,104,.07),transparent 25%),#050813;
    overflow:hidden; /* Essencial para o zoom/pan */
    padding:28px;
    cursor:grab;
    touch-action:none;
    transition: all 0.3s ease-out;
}
.nodeViewport.dragging{cursor:grabbing}
.nodeMap{
    position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;
    transition: transform 0.1s linear; /* Suaviza o pan */
}
.node{
    position:absolute;width:245px;border:1px solid var(--line);border-radius:18px;
    background:rgba(13,18,32,.94);box-shadow:0 18px 45px rgba(0,0,0,.25);padding:12px;
    transition:.2s transform,.2s filter, .2s border-color, .2s background;
    cursor:grab;user-select:none;
}
.node:hover{transform:translateY(-2px);filter:brightness(1.08)}
.node:focus-within{outline:2px solid rgba(214,173,104,.55);outline-offset:2px}
.node.nodeDragging{cursor:grabbing;z-index:12;box-shadow:0 25px 80px rgba(0,0,0,.45),0 0 0 2px rgba(214,173,104,.28)}
.nodeHeader{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:8px}
.nodeHeader h3{font-size:14px;line-height:1.25}
.nodeStatus{border:1px solid var(--line);border-radius:999px;padding:4px 7px;font-size:9px;text-transform:uppercase;color:#dbe5ff}
.nodeSummary{font-size:11px;color:#b9c4da;line-height:1.55;min-height:48px}
.nodeActions{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.nodeActions .btn{font-size:10px;padding:7px 9px;border-radius:10px}
.node.empty{border-color:rgba(154,164,184,.22)}
.node.filled{border-color:rgba(101,217,210,.45);box-shadow:0 0 0 1px rgba(101,217,210,.08) inset}
.node.review{border-color:rgba(185,156,255,.45);background:rgba(185,156,255,.06)}
.node.done{border-color:rgba(116,217,154,.55);background:rgba(116,217,154,.06)}
.node.exported{border-color:rgba(214,173,104,.65);background:rgba(214,173,104,.075)}
.node.error{border-color:rgba(225,138,138,.65);background:rgba(225,138,138,.08)}
.node.locked{border-color:var(--locked);background:rgba(107,114,128,.08);opacity:0.6;cursor:not-allowed;}
.connectorSvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.78;overflow:visible;}
.connectorSvg path{fill:none;stroke:rgba(101,217,210,.35);stroke-width:3;stroke-linecap:round;stroke-dasharray:8 9}
.connectorSvg path.mainLine{stroke:rgba(214,173,104,.45);stroke-width:4;stroke-dasharray:none}
.connectorSvg path.liveLine{stroke:rgba(101,217,210,.38);stroke-width:3.2;stroke-linecap:round;stroke-dasharray:8 9;filter:drop-shadow(0 0 6px rgba(101,217,210,.06))}
.connectorSvg path.liveLine.main{stroke:rgba(214,173,104,.52);stroke-width:4;stroke-dasharray:none}
.connectorSvg path.liveLine.ready{stroke:rgba(116,217,154,.48)}
.nodeLegend{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.legendItem{font-size:10px;color:#cbd5e1;border:1px solid var(--line);border-radius:999px;padding:5px 8px}
.legendItem b{display:inline-block;width:8px;height:8px;border-radius:99px;margin-right:5px}
.zoomTools{display:flex;gap:8px;flex-wrap:wrap}
.mindMiniOutput{max-height:140px;min-height:90px}
.statusDot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:#64748b}
.statusDot.filled{background:var(--cyan)}
.statusDot.review{background:var(--purple)}
.statusDot.done{background:var(--green)}
.statusDot.exported{background:var(--gold)}
.statusDot.error{background:var(--red)}
.statusDot.locked{background:var(--locked)}

/* Canvas Mode Specifics */
body.mind-canvas-mode{
    overflow: hidden; /* Garante que o body não role no modo canvas */
}
body.mind-canvas-mode .topbar{
    transform: translateY(-100%); /* Esconde a topbar no modo canvas */
    position: fixed; /* Para que o translate funcione bem */
}
body.mind-canvas-mode .shell{
    grid-template-columns: 1fr; /* Oculta a sidebar principal */
    min-height: 100vh;
}
body.mind-canvas-mode .side{
    display: none; /* Oculta a sidebar */
}
body.mind-canvas-mode .main{
    padding: 0; /* Remove padding do main para o canvas ocupar tudo */
    overflow: hidden; /* Garante que o main não role */
}
body.mind-canvas-mode .mindHero{
    padding: 14px 16px;
    position: sticky; /* Mantém o mindHero no topo do viewport do canvas */
    top: 0;
    z-index: 10;
    background: rgba(7,10,18,.94); /* Fundo semi-transparente para o sticky */
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(10px);
}
body.mind-canvas-mode .nodeViewport{
    height: calc(100vh - 64px - 80px); /* Altura total - topbar (escondida) - mindHero */
    padding: 14px; /* Ajusta o padding para o modo canvas */
    border-radius: 0; /* Remove bordas arredondadas para ocupar mais espaço */
    border: none; /* Remove borda */
    background: #050813; /* Fundo mais escuro para o canvas */
}
.mindSubtitle{margin:2px 0 0;font-size:12px;color:#b8c4da;line-height:1.45}
.mindSubtitle strong{color:#eadcc1}
.compactMind .eggTerminal{min-width:320px;padding:9px 10px}
.compactMind .eggFace{width:42px;height:42px;border-radius:14px;font-size:24px}
.progressToggleRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
.progressPanel{display:none}.progressPanel.open{display:block}
.progressPanel .progressFlow{margin-top:10px}
.mindControlBar{display:flex;gap:7px;flex-wrap:wrap;align-items:center;justify-content:flex-end;margin-top:8px}
.mindControlBar .btn{padding:7px 10px;font-size:11px}
.zoomReadout{border:1px solid var(--line);border-radius:999px;background:#080c17;color:#dbe5ff;padding:7px 10px;font:11px Space Mono,monospace;min-width:62px;text-align:center}
.nodeViewport.freeZoom{cursor:grab}
.nodeViewport.freeZoom .mapHint{background:rgba(214,173,104,.12);border-color:rgba(214,173,104,.35);color:#f8e0b2}
.mapHint{position:absolute;right:12px;bottom:12px;border:1px solid rgba(101,217,210,.25);background:rgba(5,8,19,.82);color:#baf7f2;border-radius:999px;padding:7px 10px;font:10px Space Mono,monospace;pointer-events:none;z-index:4}
.node.collapsed .nodeSummary,.node.collapsed .nodeActions{display:none}
.node.collapsed{height:auto;min-height:70px}
.nodeToggle{border:1px solid var(--line);background:rgba(255,255,255,.035);color:#dbe5ff;border-radius:999px;width:24px;height:24px;display:grid;place-items:center;font-size:11px;padding:0;flex:0 0 auto}
.sideMindTools{margin-top:14px;border:1px solid rgba(101,217,210,.18);background:rgba(101,217,210,.04);border-radius:14px;padding:10px}
.sideMindTools .btn{width:100%;margin:4px 0;padding:8px 9px;font-size:11px}
.sideMindTools strong{display:block;color:#eadcc1;font-size:11px;margin-bottom:6px}
.mapToolbarNote{font-size:10px;color:#baf7f2;font-family:Space Mono,monospace;border:1px solid rgba(101,217,210,.22);background:rgba(101,217,210,.055);padding:6px 9px;border-radius:999px;display:inline-flex;gap:6px;align-items:center}
.nodeMiniHandle{position:absolute;right:10px;bottom:8px;color:#64748b;font-size:13px;pointer-events:none}
.nodeDragging .nodeMiniHandle{color:#d6ad68}

/* Node Workspace (Estação de Trabalho do Node Ativo) */
.nodeWorkspace{
    position:absolute;
    width:min(480px, 90vw); /* Largura responsiva */
    max-height: calc(100vh - 180px); /* Altura máxima para caber na tela */
    border:1px solid var(--line);
    border-radius:18px;
    background:var(--panel);
    box-shadow:0 18px 45px rgba(0,0,0,.25);
    padding:16px;
    z-index:15; /* Acima dos outros nodes */
    overflow-y: auto; /* A rolagem deve ser aqui, não no canvas */
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: all 0.3s ease-out;
}
.nodeWorkspace .workHead{
    display:flex;gap:12px;align-items:flex-start;justify-content:space-between;
    border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:10px;
}
.nodeWorkspace .workHead h3{font-size:18px;line-height:1.2}
.nodeWorkspace .workHead .workBadge{
    display:inline-flex;padding:4px 8px;border:1px solid rgba(101,217,210,.32);
    border-radius:999px;color:#baf7f2;background:rgba(101,217,210,.08);
    font:10px Space Mono,monospace;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;
}
.nodeWorkspace .workHead .mini{font-size:11px;color:var(--muted);margin-top:4px;}

let generatingType = ''; // Simula o tipo de geração ativa

let currentZoom = 1.0;

// Funções utilitárias (simuladas ou simplificadas)
function $(id) { return document.getElementById(id); }
function val(id) { return localStorage.getItem(id) || ''; }
function setVal(id, value) { localStorage.setItem(id, value); }
function getRealText(id) { return localStorage.getItem(id + 'Out') || ''; }
function choice(key, fallback) { return localStorage.getItem(key) || fallback; }
function masterChoice(key, fallback) { return localStorage.getItem(key) || fallback; }
function appendToExport(sourceId, title, clear = false) {
    const content = getRealText(sourceId);

        exportContent += `\n\n--- ${title} ---\n${content}`;

        alert(`"${title}" aplicado ao pacote final!`);

        alert(`Não há conteúdo para aplicar de "${title}". Gere-o primeiro.`);
    }
}
function download(filename, elementId) {
    const text = getRealText(elementId);
    if (!text) { alert('Não há conteúdo para baixar.'); return; }
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
}
function copy(elementId) {
    const text = getRealText(elementId);
    if (!text) { alert('Não há conteúdo para copiar.'); return; }
    navigator.clipboard.writeText(text).then(() => {
        alert('Conteúdo copiado para a área de transferência!');
    }).catch(err => {
        console.error('Erro ao copiar: ', err);
        alert('Falha ao copiar o conteúdo.');
    });
}
function generate(type) {
    generatingType = type;
    renderMindJob(); // Atualiza o status visual
    setTimeout(() => {
        let result = `Conteúdo gerado para ${type}.`;
        if (type === 'complete') {
            result = `Pacote Mestre Gerado:\n\nProjeto: ${val('projectName')}\nBriefing: ${val('brief')}\nModelo: ${choice('briefTemplate','template')}\nFormato: ${choice('briefFormat','format')}\n...`;
            setVal('out', result);
        } else if (type === 'templatePlan') {
            result = `Plano de Modelo:\n\nTemplate: ${choice('briefTemplate','template')}\nFormato: ${choice('briefFormat','format')}\n...`;
            setVal('templateOut', result);
        } else if (type === 'visualScript') {
            result = `Roteiro Visual:\n\nCena 1: [Descrição da cena]\nCena 2: [Descrição da cena]\n...`;
            setVal('scriptOut', result);
        } else if (type === 'remotionJson') {
            result = `JSON Remotion:\n\n{\n  "scenes": [\n    { "id": "intro", "duration": 5, "layers": [] }\n  ]\n}`;
            setVal('jsonOut', result);
        } else if (type === 'srt') {
            result = `SRT Gerado:\n\n1\n00:00:00,000 --> 00:00:05,000\nPrimeira linha de legenda.`;
            setVal('srtOut', result);
        } else if (type === 'previewGuide') {
            result = `Guia de Preview:\n\nVerifique o ritmo e a transição das cenas.`;
            setVal('previewOut', result);
        } else if (type === 'capcutPrompt') {
            result = `Prompt para CapCut:\n\nCrie um vídeo com o seguinte roteiro...`;
            setVal('jsonOut', result); // CapCut prompt também vai para jsonOut
        } else if (type === 'shotList') {
            result = `Shot List:\n\n1. Plano Aberto: [Descrição]\n2. Close-up: [Descrição]\n...`;
            setVal('scriptOut', result); // Shot list também vai para scriptOut
        } else if (type === 'soundPlan') {
            result = `Plano de Som:\n\nTrilha: [Nome da trilha]\nSFX: [Efeitos sonoros]\n...`;
            setVal('srtOut', result); // Plano de som também vai para srtOut
        }
        generatingType = ''; // Limpa o status de geração
        renderMindJob();
        alert(`Geração de "${type}" concluída!`);
    }, 1500); // Simula um tempo de processamento
}
function clearBriefing() {

function syncMasterToTabs() {

    // Para este exemplo, apenas garante que os valores internos estão atualizados

// Funções do Canvas
function getNodePos(id) { return nodePositions[id]; }
function setNodePos(id, x, y) { nodePositions[id] = { x, y }; }

    mindCanvasMode = !mindCanvasMode;

function toggleProgressPanel() {

function updateMindPanelState() {
    document.body.classList.toggle('mind-canvas-mode', mindCanvasMode);
    // Oculta/mostra a topbar
    const topbar = document.querySelector('.topbar');

    }

}

function setMindTransform() {
    const map = $('mindCanvas');
    if (map) {
        map.style.transform = `translate(${currentPan.x}px, ${currentPan.y}px) scale(${currentZoom})`;
        $('zoomReadout').textContent = `${Math.round(currentZoom * 100)}%`;
    }
}

function centerMind() {
    const viewport = $('nodeViewport');
    const map = $('mindCanvas');
    if (!viewport || !map) return;

    const viewportRect = viewport.getBoundingClientRect();
    const mapRect = map.getBoundingClientRect();

    // Calcula o centro do mapa (considerando o zoom atual)
    let mapCenterX = (mapRect.width / currentZoom) / 2;
    let mapCenterY = (mapRect.height / currentZoom) / 2;

    // Calcula o deslocamento necessário para centralizar
    currentPan.x = (viewportRect.width / 2) - mapCenterX * currentZoom;
    currentPan.y = (viewportRect.height / 2) - mapCenterY * currentZoom;

    // Ajusta para que o ponto (0,0) do mapa esteja no centro do viewport
    // Isso é uma simplificação, o ideal seria centralizar os nodes existentes.
    // Para centralizar os nodes, precisaríamos calcular o bounding box de todos os nodes.
    // Por enquanto, vamos centralizar o ponto de origem do mapa.
    currentPan.x = (viewportRect.width / 2) - (mapRect.width / 2);
    currentPan.y = (viewportRect.height / 2) - (mapRect.height / 2);

    // Uma abordagem mais robusta seria encontrar o centro geométrico de todos os nodes
    // e centralizar esse ponto no viewport.
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    const nodes = document.querySelectorAll('.node');
    if (nodes.length > 0) {
        nodes.forEach(node => {
            const rect = node.getBoundingClientRect();
            minX = Math.min(minX, nodePositions[node.dataset.nodeId].x);
            minY = Math.min(minY, nodePositions[node.dataset.nodeId].y);
            maxX = Math.max(maxX, nodePositions[node.dataset.nodeId].x + node.offsetWidth);
            maxY = Math.max(maxY, nodePositions[node.dataset.nodeId].y + node.offsetHeight);
        });
        const contentWidth = maxX - minX;
        const contentHeight = maxY - minY;
        const contentCenterX = minX + contentWidth / 2;
        const contentCenterY = minY + contentHeight / 2;

        currentPan.x = (viewportRect.width / 2) - (contentCenterX * currentZoom);
        currentPan.y = (viewportRect.height / 2) - (contentCenterY * currentZoom);
    } else {
        // Se não há nodes, centraliza o ponto (0,0) do mapa
        currentPan.x = viewportRect.width / 2;
        currentPan.y = viewportRect.height / 2;
    }


    setMindTransform();
    updateConnectors();
}

function resetZoom() {
    currentZoom = 1.0;
    centerMind(); // Centraliza após resetar o zoom
}

function initMindInteractions() {
    const viewport = $('nodeViewport');
    const map = $('mindCanvas');
    if (!viewport || !map) return;

    // Dragging do mapa
    viewport.onmousedown = (e) => {
        if (e.button === 0 && !e.target.closest('.node')) { // Apenas se não clicar em um node
            isDraggingMap = true;
            viewport.classList.add('dragging');
            startDragMap = { x: e.clientX, y: e.clientY };
            startPan = { x: currentPan.x, y: currentPan.y };
            e.preventDefault();
        }
    };
    viewport.onmousemove = (e) => {
        if (isDraggingMap) {
            const dx = e.clientX - startDragMap.x;
            const dy = e.clientY - startDragMap.y;
            currentPan.x = startPan.x + dx;
            currentPan.y = startPan.y + dy;
            setMindTransform();
            updateConnectors();
        }
    };
    viewport.onmouseup = () => {
        isDraggingMap = false;
        viewport.classList.remove('dragging');
    };
    viewport.onmouseleave = () => {
        isDraggingMap = false;
        viewport.classList.remove('dragging');
    };

    // Zoom com roda do mouse
    viewport.onwheel = (e) => {
        e.preventDefault();
        const scaleAmount = 0.1;
        const mouseX = e.clientX - viewport.getBoundingClientRect().left;
        const mouseY = e.clientY - viewport.getBoundingClientRect().top;

        const worldX = (mouseX - currentPan.x) / currentZoom;
        const worldY = (mouseY - currentPan.y) / currentZoom;

        if (e.deltaY < 0) { // Zoom in
            currentZoom += scaleAmount;
        } else { // Zoom out
            currentZoom -= scaleAmount;
        }
        currentZoom = Math.max(0.2, Math.min(2.0, currentZoom)); // Limita o zoom

        currentPan.x = mouseX - worldX * currentZoom;
        currentPan.y = mouseY - worldY * currentZoom;

        setMindTransform();
        updateConnectors();
    };

    // Dragging de nodes
    document.querySelectorAll('.node').forEach(node => {
        let isDraggingNode = false;
        let offset = { x: 0, y: 0 };

        node.onmousedown = (e) => {
            if (e.button === 0) {
                isDraggingNode = true;
                node.classList.add('nodeDragging');
                const nodeRect = node.getBoundingClientRect();
                offset = {
                    x: e.clientX - nodeRect.left,
                    y: e.clientY - nodeRect.top
                };
                e.stopPropagation(); // Impede o dragging do mapa
            }
        };

        viewport.onmousemove = (e) => {
            if (isDraggingNode) {
                const viewportRect = viewport.getBoundingClientRect();
                let newX = (e.clientX - viewportRect.left - offset.x - currentPan.x) / currentZoom;
                let newY = (e.clientY - viewportRect.top - offset.y - currentPan.y) / currentZoom;

                // Limita o movimento dentro do viewport (opcional, pode ser removido)
                newX = Math.max(0, newX);
                newY = Math.max(0, newY);
                newX = Math.min((viewportRect.width / currentZoom) - node.offsetWidth, newX);
                newY = Math.min((viewportRect.height / currentZoom) - node.offsetHeight, newY);


                node.style.left = `${newX}px`;
                node.style.top = `${newY}px`;
                setNodePos(node.dataset.nodeId, newX, newY);
                updateConnectors();
            }
        };

        node.onmouseup = () => {
            isDraggingNode = false;
            node.classList.remove('nodeDragging');
        };
        node.onmouseleave = () => {
            if (isDraggingNode) { // Se o mouse sair enquanto arrasta, solta o node
                isDraggingNode = false;
                node.classList.remove('nodeDragging');
            }
        };
    });
}

function drawPath(a, b, kind = '') {
    const A = nodeCenter(a), B = nodeCenter(b);
    if (!A || !B) return '';

    // Ajusta as coordenadas para o zoom e pan atuais
    const A_transformed = {
        x: A.x * currentZoom + currentPan.x,
        y: A.y * currentZoom + currentPan.y
    };
    const B_transformed = {
        x: B.x * currentZoom + currentPan.x,
        y: B.y * currentZoom + currentPan.y
    };

    const dx = Math.max(80 * currentZoom, Math.abs(B_transformed.x - A_transformed.x) * 0.45);
    const c1x = A_transformed.x + dx;
    const c1y = A_transformed.y;
    const c2x = B_transformed.x - dx;
    c2y = B_transformed.y; // Corrigido para usar B_transformed.y

    const d = `M ${A_transformed.x} ${A_transformed.y} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${B_transformed.x} ${B_transformed.y}`;
    return `<path class="liveLine ${kind}" d="${d}" />`;
}

function nodeCenter(nodeId) {

function v17Options(current, options) {

    const all = options.concat(String(current).split(',').map(v => v.trim())).filter(v => {

        if (seen.has(k)) return false;

    });

}
function nextNode() {
    const nodesOrder = ['brief', 'modelo', 'roteiro', 'json', 'srt', 'preview', 'pacote', 'ramo'];
    const currentIndex = nodesOrder.indexOf(activeNodeId);

function focusNode(nodeId) {
    // Esta função pode ser usada para centralizar e talvez dar um zoom no node clicado
    const nodeElement = $(`node-${nodeId}`);
    if (!nodeElement) return;

    const viewport = $('nodeViewport');
    const viewportRect = viewport.getBoundingClientRect();

    const nodeRect = nodeElement.getBoundingClientRect();
    const nodeX = nodePositions[nodeId].x;
    const nodeY = nodePositions[nodeId].y;

    // Calcula o novo pan para centralizar o node
    currentPan.x = (viewportRect.width / 2) - (nodeX + nodeRect.width / (2 * currentZoom)) * currentZoom;
    currentPan.y = (viewportRect.height / 2) - (nodeY + nodeRect.height / (2 * currentZoom)) * currentZoom;

    setMindTransform();
    updateConnectors();
}

function workspacePosition(id) {
    const p = getNodePos(id);
    // Posição do workspace em relação ao viewport, não ao mapa
    // Ajustado para aparecer à direita do node ativo ou centralizado
    const viewport = $('nodeViewport');
    const viewportRect = viewport.getBoundingClientRect();
    const nodeElement = $(`node-${id}`);
    if (!nodeElement) return { x: 50, y: 50 }; // Fallback

    const nodeRect = nodeElement.getBoundingClientRect();

    // Posição do node no viewport (já com zoom e pan aplicados)
    const nodeViewportX = nodeRect.left - viewport.getBoundingClientRect().left;
    const nodeViewportY = nodeRect.top - viewport.getBoundingClientRect().top;

    // Tenta posicionar à direita do node, com um pequeno offset
    let wsX = nodeViewportX + nodeRect.width + 30;
    let wsY = nodeViewportY;

    // Se o workspace sair da tela à direita, move para a esquerda do node
    const workspaceWidth = 480; // Largura aproximada do nodeWorkspace
    if (wsX + workspaceWidth > viewportRect.width) {
        wsX = nodeViewportX - workspaceWidth - 30;
        if (wsX < 0) { // Se ainda sair da tela, centraliza
            wsX = (viewportRect.width - workspaceWidth) / 2;
        }
    }

    // Ajusta para não sair do topo ou da base
    const workspaceHeight = Math.min(400, viewportRect.height - 180); // Altura máxima aproximada
    if (wsY + workspaceHeight > viewportRect.height) {
        wsY = viewportRect.height - workspaceHeight - 20;
    }
    if (wsY < 0) wsY = 20;

    // Converte as coordenadas do viewport de volta para as coordenadas do mapa
    // para que o CSS 'left' e 'top' funcionem corretamente no nodeMap
    const map = $('mindCanvas');
    const mapRect = map.getBoundingClientRect();

    const finalX = (wsX - currentPan.x) / currentZoom;
    const finalY = (wsY - currentPan.y) / currentZoom;

    return { x: finalX, y: finalY };
}

        { id: 'modelo', ...p('modelo'), title: '2. Modelo / Formato', icon: '🎛️', status: choice('briefTemplate', 'template') ? 'ready' : 'empty', summary: `${choice('briefTemplate', 'template') || 'Sem modelo'} · ${choice('briefFormat', 'format') || ''} · ${choice('briefDuration', 'duration') || ''} · ${choice('briefMotionStyle', 'motionStyle') || ''}`, actions: [{ label: 'Abrir', fn: "activeNodeId='modelo';renderMindJob()" }, { label: 'Gerar plano', cls: 'gold', fn: "generate('templatePlan')" }, { label: 'Aplicar', cls: 'cyan', fn: "appendToExport('templateOut','MODELO',true)" }] },
        { id: 'roteiro', ...p('roteiro'), title: '3. Roteiro Visual', icon: '🎞️', status: nodeStatusFromText('scriptOut'), summary: getRealText('scriptOut') ? shortText(getRealText('scriptOut')) : 'Recebe objetivo, tom e texto obrigatório do Briefing Mestre.', actions: [{ label: 'Abrir', fn: "activeNodeId='roteiro';renderMindJob()" }, { label: 'Gerar roteiro', cls: 'gold', fn: "generate('visualScript')" }, { label: 'Shot list', cls: 'purple', fn: "generate('shotList')" }, { label: 'Aplicar', cls: 'cyan', fn: "appendToExport('scriptOut','ROTEIRO',true)" }] },
        { id: 'json', ...p('json'), title: '4. JSON / Remotion', icon: '</>', status: nodeStatusFromText('jsonOut'), summary: getRealText('jsonOut') ? shortText(getRealText('jsonOut')) : 'Recebe formato, duração, movimento e precisão do JSON.', actions: [{ label: 'Abrir', fn: "activeNodeId='json';renderMindJob()" }, { label: 'Gerar JSON', cls: 'gold', fn: "generate('remotionJson')" }, { label: 'CapCut', cls: 'purple', fn: "generate('capcutPrompt')" }, { label: 'Aplicar', cls: 'cyan', fn: "appendToExport('jsonOut','JSON / CAPCUT',true)" }] },
        { id: 'srt', ...p('srt'), title: '5. SRT / Som', icon: '🎧', status: nodeStatusFromText('srtOut'), summary: getRealText('srtOut') ? shortText(getRealText('srtOut')) : 'Recebe duração, tom e tipo de áudio do Briefing Mestre.', actions: [{ label: 'Abrir', fn: "activeNodeId='srt';renderMindJob()" }, { label: 'Gerar SRT', cls: 'gold', fn: "generate('srt')" }, { label: 'Plano som', cls: 'purple', fn: "generate('soundPlan')" }, { label: 'Aplicar', cls: 'cyan', fn: "appendToExport('srtOut','SRT / SOM',true)" }] },
        { id: 'preview', ...p('preview'), title: '6. Preview', icon: '🖥️', status: nodeStatusFromText('previewOut'), summary: getRealText('previewOut') ? shortText(getRealText('previewOut')) : 'Preview leve para validar ritmo sem MP4.', actions: [{ label: 'Abrir', fn: "activeNodeId='preview';renderMindJob()" }, { label: 'Atualizar', cls: 'gold', fn: 'updatePreview();renderMindJob()' }, { label: 'Guia', cls: 'purple', fn: "generate('previewGuide')" }, { label: 'Aplicar', cls: 'cyan', fn: "appendToExport('previewOut','PREVIEW',true)" }] },
        { id: 'pacote', ...p('pacote'), title: '7. Pacote Final', icon: '📦', status: exportStatus(), summary: getRealText('exportOut') ? shortText(getRealText('exportOut')) : 'Node final: montar, copiar, baixar e compartilhar pacote limpo.', actions: [{ label: 'Abrir', fn: "activeNodeId='pacote';renderMindJob()" }, { label: 'Montar limpo', cls: 'gold', fn: 'buildExport(false)' }, { label: 'Copiar', fn: "copy('exportOut')" }, { label: 'Baixar', cls: 'green', fn: "download('video-pack-limpo.txt','exportOut')" }, { label: 'Compartilhar', cls: 'cyan', fn: 'shareExport()' }] },
        { id: 'ramo', ...p('ramo'), title: 'Ramificações', icon: '🌳', status: Object.keys(appliedSections).length ? 'review' : (briefReady ? 'ready' : 'empty'), summary: 'Conceito visual, diagnóstico criativo, atos narrativos, assets, áudio, CapCut e checklist nascem do Briefing Mestre e dos cards.', actions: [{ label: 'Revisar cards', cls: 'purple', fn: 'reorganizeCards()' }, { label: 'Aplicar cards', cls: 'cyan', fn: "alert('Use o botão Aplicar dentro de cada card da Central de Banners.')" }] }
    ];
    const nodes = nodesBase.map(n => ({ ...n, status: nodeVisualStatus(n.id, n.status, briefReady) }));
    if (!nodes.some(n => n.id === activeNodeId)) activeNodeId = 'brief';

    const canvas = $('mindCanvas');
    if (canvas) {
        // Renderiza todos os nodes e o workspace ativo
        canvas.innerHTML = nodes.map(nodeCard).join('') + renderNodeWorkspace(activeNodeId);
    }

    initMindInteractions();
    setMindTransform();
    updateConnectors(); // Atualiza os conectores após renderizar e transformar

    // Atualiza o progresso no mindHero
    const flow = [['1', 'Gerar pacote mestre', !!getRealText('out')], ['2', 'Revisar cards', !!document.querySelector('#hubCards .section-card')], ['3', 'Aplicar ao pacote', Object.keys(appliedSections).length > 0], ['4', 'Montar pacote limpo', !!getRealText('exportOut')], ['5', 'Baixar / Compartilhar', exportStatus() === 'exported']];
    let active = flow.findIndex(f => !f[2]);
    if (active < 0) active = 4;
    const pf = $('progressFlow');
    if (pf) pf.innerHTML = flow.map((f, i) => `<div class="progressStep ${f[2] ? 'done' : (i === active ? 'activeFlow' : 'wait')}"><div class="num">${f[0]}</div><div><strong>${f[1]}</strong><span>${f[2] ? 'concluído' : (i === active ? 'agora' : 'aguardando')}</span></div></div>`).join('');

    const leg = document.querySelector('.nodeLegend');
    if (leg) leg.classList.add('progressLegendPro');
    eggByStatus();
    updateMindPanelState();
}

// Inicialização
document.addEventListener('DOMContentLoaded', () => {
    syncBriefModelToModel();
    syncMasterToTabs();
    // renderHub('', ''); // Se houver um hub de cards, precisa ser renderizado
    renderMindJob();
    updateMindPanelState();
    setTimeout(() => { centerMind(); updateConnectors(); }, 160); // Pequeno delay para garantir que todos os elementos estejam renderizados
    loadApi();
});

</script>
</body>
</html>
