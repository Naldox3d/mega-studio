<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Video Pack Studio — Árvore da Criação (Nodes OS)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070a12; --panel: #0d1220; --panel2: #111827; --line: rgba(255,255,255,0.1);
  --gold: #d6ad68; --cyan: #65d9d2; --green: #74d99a; --red: #e18a8a; --purple: #b99cff;
  --text: #e8ecf4; --muted: #9aa4b8; --dark: #050813;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
body { background: radial-gradient(circle at 80% 8%, rgba(214,173,104,.08), transparent 25%), radial-gradient(circle at 12% 18%, rgba(101,217,210,.05), transparent 25%), linear-gradient(180deg, #070a12, #090d18 55%, #070a12); }
button, input, textarea, select { font: inherit; outline: none; }
button { cursor: pointer; }

/* === TYPOGRAPHY & BUTTONS === */
h1, h2, h3 { font-family: 'Syne', sans-serif; margin: 0; color: #eadcc1; letter-spacing: 0.02em; }
h2 { font-size: 20px; margin-bottom: 12px; }
h3 { font-size: 16px; }
p { color: #bac3d8; line-height: 1.6; }
.mini { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
.kicker { display: inline-flex; padding: 4px 10px; border: 1px solid rgba(101,217,210,.3); border-radius: 999px; color: #baf7f2; background: rgba(101,217,210,.08); font: 10px 'Space Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }

.btn { border: 1px solid var(--line); border-radius: 10px; background: var(--panel2); color: var(--text); padding: 8px 14px; font-size: 12px; font-weight: 700; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn.gold { background: linear-gradient(180deg, #e1bc7b, #c89a55); color: #1a1203; border-color: rgba(214,173,104,.65); }
.btn.cyan { background: rgba(101,217,210,.1); border-color: rgba(101,217,210,.35); color: #cafffb; }
.btn.green { background: linear-gradient(180deg, #83dda9, #61c78c); color: #07140d; border-color: rgba(116,217,154,.65); }
.btn.purple { background: rgba(185,156,255,.1); border-color: rgba(185,156,255,.35); color: #eadcff; }
.btn.tiny { font-size: 10px; padding: 6px 10px; border-radius: 8px; }

/* === FORMS === */
label { display: block; color: var(--gold); font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; margin: 12px 0 6px; }
input, textarea, select { width: 100%; border: 1px solid var(--line); border-radius: 12px; background: #0b1020; color: var(--text); padding: 12px; font-size: 13px; transition: border 0.2s; }
input:focus, textarea:focus, select:focus { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(101,217,210,0.1); }
textarea { min-height: 100px; resize: vertical; line-height: 1.5; font-family: 'Space Mono', monospace; font-size: 12px; }

.output-box { white-space: pre-wrap; background: #060912; border: 1px solid var(--line); border-radius: 12px; padding: 14px; font: 11px/1.6 'Space Mono', monospace; color: #dbe5ff; max-height: 350px; overflow-y: auto; }

/* === LAYOUT === */
.topbar { position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: rgba(7,10,18,0.85); border-bottom: 1px solid var(--line); backdrop-filter: blur(12px); }
.brand { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 18px; color: #eadcc1; }
.brand small { font-family: 'Space Mono', monospace; color: var(--gold); font-size: 10px; margin-left: 8px; vertical-align: middle; }
.shell { height: calc(100vh - 53px); display: flex; overflow: hidden; }

/* === CANVAS (NODES) MODE - THE CORE === */
.nodeViewport { flex: 1; position: relative; background: #050813; overflow: hidden; cursor: grab; background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px; }
.nodeViewport.dragging { cursor: grabbing; }
.nodeMap { position: absolute; left: 0; top: 0; transform-origin: 0 0; will-change: transform; width: 4000px; height: 3000px; }
.connectorSvg { position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; z-index: 1; }
.connectorSvg path { fill: none; stroke: rgba(101,217,210,0.25); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 6 6; transition: stroke 0.3s; }
.connectorSvg path.active-link { stroke: rgba(214,173,104,0.6); stroke-dasharray: none; stroke-width: 4; filter: drop-shadow(0 0 6px rgba(214,173,104,0.3)); }

/* === NODE COMPONENT === */
.node { position: absolute; width: 240px; border: 1px solid var(--line); border-radius: 16px; padding: 14px; background: rgba(13,18,32,0.9); backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); cursor: pointer; user-select: none; transition: transform 0.1s, box-shadow 0.2s, border-color 0.2s; z-index: 5; }
.node:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.3); }
.node.nodeDragging { cursor: grabbing; z-index: 50; transform: scale(1.02); box-shadow: 0 20px 50px rgba(214,173,104,0.15); border-color: var(--gold); }
.node.activeNode { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold), 0 15px 40px rgba(0,0,0,0.6); z-index: 10; background: rgba(18,24,40,0.95); }

.nodeHeader { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--line); padding-bottom: 10px; margin-bottom: 10px; }
.nodeIcon { width: 36px; height: 36px; display: grid; place-items: center; border-radius: 10px; background: rgba(255,255,255,0.05); font-size: 16px; border: 1px solid var(--line); }
.node h3 { font-size: 14px; margin: 0; line-height: 1.2; }
.nodeStatus { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold); display: block; margin-top: 4px; }
.nodeSummary { font-size: 11px; color: var(--muted); line-height: 1.5; min-height: 34px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

/* Node States */
.node.state-done .nodeIcon { background: rgba(116,217,154,0.1); border-color: rgba(116,217,154,0.3); color: var(--green); }
.node.state-done .nodeStatus { color: var(--green); }
.node.state-ready .nodeIcon { background: rgba(101,217,210,0.1); border-color: rgba(101,217,210,0.3); color: var(--cyan); }
.node.state-ready .nodeStatus { color: var(--cyan); }

/* === FOCUS STATION (THE "BLENDER" WORKSPACE) === */
.focusOverlay { position: absolute; inset: 0; background: rgba(3,5,10,0.6); backdrop-filter: blur(4px); z-index: 90; display: none; opacity: 0; transition: opacity 0.3s; }
.focusOverlay.active { display: block; opacity: 1; }

.focusStation { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95); width: 90vw; max-width: 1100px; max-height: 85vh; background: #0b101d; border: 1px solid rgba(214,173,104,0.3); border-radius: 20px; box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 1px rgba(214,173,104,0.1); z-index: 100; display: none; opacity: 0; flex-direction: column; overflow: hidden; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
.focusStation.active { display: flex; transform: translate(-50%, -50%) scale(1); opacity: 1; }

.fs-header { padding: 16px 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }
.fs-header-title { display: flex; align-items: center; gap: 12px; }
.fs-badge { font-size: 10px; padding: 4px 8px; border-radius: 6px; border: 1px solid var(--gold); color: var(--gold); background: rgba(214,173,104,0.1); text-transform: uppercase; font-weight: 800; letter-spacing: 0.1em; }

.fs-body { display: flex; flex: 1; overflow: hidden; }
.fs-main { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
.fs-sidebar { width: 340px; border-left: 1px solid var(--line); background: rgba(7,10,18,0.5); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }

/* Grid forms */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Visual Memory Panel */
.visualDrop { border: 1px dashed rgba(101,217,210,0.4); border-radius: 12px; background: rgba(101,217,210,0.05); padding: 24px 16px; text-align: center; color: var(--cyan); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.visualDrop:hover { background: rgba(101,217,210,0.1); border-color: var(--cyan); }
.visualDrop input { display: none; }
.visualGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 12px; }
.visualThumb { aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: #000; border: 1px solid var(--line); position: relative; }
.visualThumb img { width: 100%; height: 100%; object-fit: cover; }
.visualThumb span { font-size: 10px; color: var(--muted); display: grid; place-items: center; height: 100%; padding: 8px; text-align: center; font-family: 'Space Mono'; }

/* Floating Controls */
.controls-panel { position: absolute; bottom: 24px; right: 24px; display: flex; gap: 8px; z-index: 80; background: rgba(11,16,29,0.8); padding: 8px; border-radius: 14px; border: 1px solid var(--line); backdrop-filter: blur(10px); }
.zoom-readout { display: grid; place-items: center; padding: 0 12px; font: 12px 'Space Mono', monospace; color: var(--gold); }

@media(max-width: 900px) {
  .fs-body { flex-direction: column; }
  .fs-sidebar { width: 100%; border-left: none; border-top: 1px solid var(--line); max-height: 40vh; }
  .node { width: 200px; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">Video Pack Studio <small>Titan OS V3.0 (Nodes Only)</small></div>
  <div>
    <button class="btn gold" onclick="reorganizeMind()">Organizar Mapa</button>
    <button class="btn cyan" onclick="exportFinal()">Exportar Pacote</button>
  </div>
</header>

<div class="shell">
  <!-- Core Canvas Area -->
  <div class="nodeViewport" id="viewport">
    <div class="nodeMap" id="nodeMap">
      <svg class="connectorSvg" id="svgLayer"></svg>
      <div id="nodesContainer"></div>
    </div>
  </div>

  <!-- Focus Overlay & Station -->
  <div class="focusOverlay" id="focusOverlay" onclick="closeFocusStation()"></div>
  
  <div class="focusStation" id="focusStation">
    <div class="fs-header">
      <div class="fs-header-title">
        <span class="fs-badge" id="fsStatus">Editando</span>
        <h2 id="fsTitle" style="margin:0;">Briefing Mestre</h2>
      </div>
      <button class="btn" onclick="closeFocusStation()">✕ Fechar (Voltar ao Mapa)</button>
    </div>
    <div class="fs-body">
      <div class="fs-main" id="fsMainContent">
        <!-- Injected via JS based on active node -->
      </div>
      <aside class="fs-sidebar">
        <h3>🖼️ Contexto Visual / IA</h3>
        <p class="mini">Faça upload de referências visuais (storyboard, animes, frames) para guiar a direção de arte e os prompts da IA.</p>
        <label class="visualDrop">
          + Adicionar Referências Visuais
          <input type="file" accept="image/*" multiple onchange="handleImageUpload(this)">
        </label>
        <div class="visualGrid" id="visualGrid"></div>
        
        <label style="margin-top:20px;">Memória Estética Extraída</label>
        <textarea id="visualMemory" placeholder="A IA vai analisar as imagens e definir o moodboard aqui..." oninput="appState.visualMemory = this.value"></textarea>
        <button class="btn tiny cyan" style="width:100%" onclick="analyzeVisuals()">Analisar com IA</button>
      </aside>
    </div>
  </div>
  
  <!-- Floating Canvas Controls -->
  <div class="controls-panel">
    <button class="btn tiny" onclick="zoomMap(-0.1)">- Zoom</button>
    <span class="zoom-readout" id="zoomReadout">100%</span>
    <button class="btn tiny" onclick="zoomMap(0.1)">+ Zoom</button>
    <button class="btn tiny" onclick="centerMap()">Centralizar</button>
  </div>
</div>

<script>
/**
 * TITAN OS - CORE LOGIC
 * Reescrito para ser uma Single Page Application baseada inteiramente em Nodes/Canvas.
 */

const $ = id => document.getElementById(id);

// --- GLOBAL STATE ---
const appState = {
  zoom: 1,
  panX: 0,
  panY: 0,
  activeNode: null,
  visualRefs: [],
  visualMemory: '',
  // Node Data Store
  data: {
    brief: { title: '', desc: '', assets: '', req: '', goal: 'Vender', tone: 'Impactante' },
    modelo: { template: 'Motion Comic 2D', format: '9:16 vertical', duration: '30s', motion: 'Câmera seca' },
    roteiro: { content: '' },
    json: { content: '' },
    srt: { content: '' },
    preview: { content: '' },
    pacote: { content: '' }
  },
  // Map configuration
  nodesDef: [
    { id: 'brief', title: '1. Briefing Mestre', icon: '🧠', x: 50, y: 50, dependsOn: null },
    { id: 'modelo', title: '2. Modelo / Formato', icon: '🎛️', x: 380, y: 50, dependsOn: 'brief' },
    { id: 'roteiro', title: '3. Roteiro Visual', icon: '🎞️', x: 710, y: 50, dependsOn: 'modelo' },
    { id: 'json', title: '4. JSON / Remotion', icon: '</>', x: 1040, y: 50, dependsOn: 'roteiro' },
    { id: 'srt', title: '5. SRT / Som / SFX', icon: '🎧', x: 1040, y: 250, dependsOn: 'roteiro' },
    { id: 'preview', title: '6. Preview Viewer', icon: '🖥️', x: 710, y: 250, dependsOn: 'json' },
    { id: 'pacote', title: '7. Pacote Final', icon: '📦', x: 1040, y: 450, dependsOn: ['srt', 'preview'] }
  ]
};

// --- DRAG & DROP CANVAS ---
let isDraggingMap = false, isDraggingNode = false, draggedNodeId = null;
let startX, startY;

const viewport = $('viewport');
const nodeMap = $('nodeMap');

viewport.addEventListener('mousedown', e => {
  if (e.target.closest('button, input, textarea, select')) return;
  const node = e.target.closest('.node');
  if (node) {
    isDraggingNode = true;
    draggedNodeId = node.dataset.id;
    const n = appState.nodesDef.find(x => x.id === draggedNodeId);
    startX = e.clientX - (n.x * appState.zoom);
    startY = e.clientY - (n.y * appState.zoom);
    node.classList.add('nodeDragging');
  } else {
    isDraggingMap = true;
    startX = e.clientX - appState.panX;
    startY = e.clientY - appState.panY;
    viewport.classList.add('dragging');
  }
});

window.addEventListener('mousemove', e => {
  if (isDraggingMap) {
    appState.panX = e.clientX - startX;
    appState.panY = e.clientY - startY;
    updateTransform();
  } else if (isDraggingNode && draggedNodeId) {
    const n = appState.nodesDef.find(x => x.id === draggedNodeId);
    n.x = (e.clientX - startX) / appState.zoom;
    n.y = (e.clientY - startY) / appState.zoom;
    $(`node-${n.id}`).style.left = `${n.x}px`;
    $(`node-${n.id}`).style.top = `${n.y}px`;
    drawConnectors();
  }
});

window.addEventListener('mouseup', () => {
  isDraggingMap = false;
  isDraggingNode = false;
  draggedNodeId = null;
  viewport.classList.remove('dragging');
  document.querySelectorAll('.node').forEach(n => n.classList.remove('nodeDragging'));
});

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.05 : 0.05;
  zoomMap(delta, e.clientX, e.clientY);
}, { passive: false });

function zoomMap(delta, cx = viewport.clientWidth/2, cy = viewport.clientHeight/2) {
  const oldZoom = appState.zoom;
  appState.zoom = Math.max(0.3, Math.min(2.5, appState.zoom + delta));
  // Adjust pan to zoom towards mouse/center
  const rect = viewport.getBoundingClientRect();
  const ox = cx - rect.left;
  const oy = cy - rect.top;
  appState.panX = ox - (ox - appState.panX) * (appState.zoom / oldZoom);
  appState.panY = oy - (oy - appState.panY) * (appState.zoom / oldZoom);
  updateTransform();
}

function updateTransform() {
  nodeMap.style.transform = `translate(${appState.panX}px, ${appState.panY}px) scale(${appState.zoom})`;
  $('zoomReadout').innerText = `${Math.round(appState.zoom * 100)}%`;
}

function centerMap() {
  appState.zoom = 1;
  appState.panX = 50;
  appState.panY = 50;
  updateTransform();
}

function reorganizeMind() {
  const baseDef = [
    { id: 'brief', x: 50, y: 50 }, { id: 'modelo', x: 380, y: 50 }, { id: 'roteiro', x: 710, y: 50 },
    { id: 'json', x: 1040, y: 50 }, { id: 'srt', x: 1040, y: 250 }, { id: 'preview', x: 710, y: 250 },
    { id: 'pacote', x: 1040, y: 450 }
  ];
  baseDef.forEach(b => {
    const n = appState.nodesDef.find(x => x.id === b.id);
    if(n) { n.x = b.x; n.y = b.y; }
  });
  renderNodes();
  centerMap();
}

// --- RENDER PIPELINE ---
function getNodeStatus(id) {
  const d = appState.data[id];
  if (id === 'brief') return d.desc ? 'state-done' : 'state-empty';
  if (id === 'modelo') return 'state-done'; // default values exist
  if (id === 'pacote') return d.content ? 'state-done' : 'state-empty';
  return d.content ? 'state-done' : 'state-empty';
}

function getNodeSummary(id) {
  const d = appState.data[id];
  if (id === 'brief') return d.desc ? d.desc.substring(0, 60) + '...' : 'Defina a história, universo e objetivo central.';
  if (id === 'modelo') return `${d.template} • ${d.format} • ${d.duration}`;
  return d.content ? 'Gerado com sucesso.' : 'Aguardando geração.';
}

function renderNodes() {
  const container = $('nodesContainer');
  container.innerHTML = appState.nodesDef.map(n => {
    const status = getNodeStatus(n.id);
    const summary = getNodeSummary(n.id);
    const isActive = appState.activeNode === n.id ? 'activeNode' : '';
    return `
      <div class="node ${status} ${isActive}" id="node-${n.id}" data-id="${n.id}" style="left:${n.x}px; top:${n.y}px" ondblclick="openFocusStation('${n.id}')">
        <div class="nodeHeader">
          <div class="nodeIcon">${n.icon}</div>
          <div>
            <h3>${n.title}</h3>
            <span class="nodeStatus">${status === 'state-done' ? '✓ Preenchido' : '○ Aguardando'}</span>
          </div>
        </div>
        <div class="nodeSummary">${summary}</div>
        <div style="margin-top: 10px; display: flex; gap: 6px;">
          <button class="btn tiny" style="width:100%" onclick="openFocusStation('${n.id}')">Abrir Estação</button>
        </div>
      </div>
    `;
  }).join('');
  drawConnectors();
}

function drawConnectors() {
  const svg = $('svgLayer');
  let paths = '';
  appState.nodesDef.forEach(target => {
    if (!target.dependsOn) return;
    const deps = Array.isArray(target.dependsOn) ? target.dependsOn : [target.dependsOn];
    deps.forEach(depId => {
      const source = appState.nodesDef.find(n => n.id === depId);
      if (!source) return;
      
      // Calculate centers
      const sx = source.x + 120; // half of node width (240)
      const sy = source.y + 70;  // approx half height
      const tx = target.x + 120;
      const ty = target.y + 70;
      
      // Bézier curve logic for a smooth "Nuke/Unreal" feel
      const dist = Math.abs(tx - sx);
      const cx1 = sx + (dist * 0.5);
      const cy1 = sy;
      const cx2 = tx - (dist * 0.5);
      const cy2 = ty;
      
      // Highlight link if both nodes are done
      const sDone = getNodeStatus(source.id) === 'state-done';
      const tDone = getNodeStatus(target.id) === 'state-done';
      const cssClass = sDone && tDone ? 'active-link' : '';

      paths += `<path class="${cssClass}" d="M ${sx} ${sy} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${tx} ${ty}" />`;
    });
  });
  svg.innerHTML = paths;
}

// --- FOCUS STATION (BLENDER WORKSPACE) ---
function openFocusStation(id) {
  appState.activeNode = id;
  const n = appState.nodesDef.find(x => x.id === id);
  $('fsTitle').innerText = n.title;
  $('fsStatus').innerText = getNodeStatus(id) === 'state-done' ? 'Aprovado' : 'Editando';
  
  const main = $('fsMainContent');
  const d = appState.data;
  
  // Dynamic Forms based on Node ID
  if (id === 'brief') {
    main.innerHTML = `
      <div class="grid-2">
        <div>
          <label>Título do Projeto</label>
          <input type="text" id="in_title" value="${d.brief.title}" placeholder="Ex: O Hambúrguer da Meia-Noite" oninput="appState.data.brief.title=this.value">
        </div>
        <div>
          <label>Objetivo Principal</label>
          <select id="in_goal" onchange="appState.data.brief.goal=this.value">
            <option ${d.brief.goal==='Vender'?'selected':''}>Vender / Promoção</option>
            <option ${d.brief.goal==='Narrativa'?'selected':''}>Cena Narrativa / Motion Comic</option>
            <option ${d.brief.goal==='Curiosidade'?'selected':''}>Gerar Curiosidade Viral</option>
          </select>
        </div>
      </div>
      <label>Briefing / Roteiro Bruto</label>
      <textarea id="in_desc" placeholder="Cole a ideia, roteiro bruto ou referências textuais aqui..." oninput="appState.data.brief.desc=this.value">${d.brief.desc}</textarea>
      <label>Assets & Textos Obrigatórios</label>
      <textarea id="in_req" placeholder="Logos, frases obrigatórias, CTA final..." oninput="appState.data.brief.req=this.value">${d.brief.req}</textarea>
      <div style="margin-top:auto; padding-top:20px; border-top:1px solid rgba(255,255,255,0.1);">
        <button class="btn gold" onclick="closeFocusStation(); openFocusStation('modelo');">Salvar & Próximo ›</button>
      </div>
    `;
  } else if (id === 'modelo') {
    main.innerHTML = `
      <div class="grid-2">
        <div><label>Estilo Visual</label><select onchange="appState.data.modelo.template=this.value"><option>Motion Comic 2D</option><option>Produto Animado</option><option>Cinematic Reels</option></select></div>
        <div><label>Formato</label><select onchange="appState.data.modelo.format=this.value"><option>9:16 Vertical</option><option>16:9 Horizontal</option></select></div>
        <div><label>Duração</label><select onchange="appState.data.modelo.duration=this.value"><option>15s</option><option>30s</option><option>60s</option></select></div>
        <div><label>Movimento / Câmera</label><select onchange="appState.data.modelo.motion=this.value"><option>Câmera seca / Tensão</option><option>Motion Graphic Fluido</option><option>Anime Snap Cuts</option></select></div>
      </div>
      <div style="margin-top:auto; padding-top:20px;">
        <button class="btn gold" onclick="closeFocusStation(); openFocusStation('roteiro');">Salvar & Próximo ›</button>
      </div>
    `;
  } else if (['roteiro', 'json', 'srt'].includes(id)) {
    main.innerHTML = `
      <p class="mini">Esta estação herda o Briefing Mestre e a Memória Visual para gerar os artefatos técnicos.</p>
      <button class="btn gold" style="width:max-content; margin-bottom:12px;" onclick="mockGenerate('${id}')">✨ Gerar com IA Sênior</button>
      <div class="output-box" id="out_${id}">${d[id].content || 'Aguardando geração da IA...'}</div>
    `;
  } else if (id === 'pacote') {
    main.innerHTML = `
      <p class="mini">Revisão final de todos os nodes e montagem do pacote de exportação.</p>
      <button class="btn green" style="width:max-content; margin-bottom:12px;" onclick="exportFinal()">Montar Pacote Limpo</button>
      <div class="output-box" id="out_pacote">${d.pacote.content || 'Nenhum pacote gerado.'}</div>
    `;
  }

  $('focusOverlay').classList.add('active');
  $('focusStation').classList.add('active');
  renderNodes(); // Update highlight
  renderVisualMemory();
}

function closeFocusStation() {
  $('focusOverlay').classList.remove('active');
  $('focusStation').classList.remove('active');
  appState.activeNode = null;
  renderNodes();
}

// --- VISUAL MEMORY (IMAGE UPLOAD) ---
function handleImageUpload(input) {
  const files = Array.from(input.files).slice(0, 4); // Max 4 for demo
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      appState.visualRefs.push(e.target.result);
      renderVisualMemory();
    };
    reader.readAsDataURL(f);
  });
}

function renderVisualMemory() {
  const grid = $('visualGrid');
  if (appState.visualRefs.length === 0) {
    grid.innerHTML = `<div class="visualThumb"><span>Sem Refs</span></div>`;
  } else {
    grid.innerHTML = appState.visualRefs.map(src => `<div class="visualThumb"><img src="${src}"></div>`).join('');
  }
  $('visualMemory').value = appState.visualMemory;
}

function analyzeVisuals() {
  $('visualMemory').value = "Analisando imagens...\n- Estilo predominante: Alto contraste, iluminação neon dramática.\n- Composição: Planos fechados (close-ups), texturas densas.\n- Paleta sugerida: Cyan profundo, Laranja industrial, Sombras em pitch black.\n\n-> Regra aplicada ao Prompt Mestre: Evitar iluminação flat. Focar em cinematografia sci-fi / horror urbano.";
  appState.visualMemory = $('visualMemory').value;
}

// --- MOCK AI GENERATION ---
function mockGenerate(targetId) {
  const box = $(`out_${targetId}`);
  box.innerText = "Sintetizando contexto visual e briefing...";
  
  setTimeout(() => {
    let result = '';
    const title = appState.data.brief.title || "Projeto Sem Título";
    
    if (targetId === 'roteiro') {
      result = `## ROTEIRO VISUAL - ${title}\n\n[00:00 - 00:03] ABERTURA HOOK\nVisual: Plano detalhe extremo. Ambiente escuro, chuva leve cortando o neon.\nCâmera: Corte seco.\nTexto: "A regra é clara..."\n\n[00:03 - 00:10] TENSÃO\nVisual: Foco no produto com iluminação dramática. Sombras densas.\nCâmera: Slow push-in.\nTexto: "...nunca olhe para trás."`;
    } else if (targetId === 'json') {
      result = `{\n  "project": "${title}",\n  "engine": "remotion",\n  "duration": "${appState.data.modelo.duration}",\n  "layers": [\n    { "id": "bg", "type": "video", "mood": "dark neon" },\n    { "id": "subject", "type": "asset", "fx": "drop-shadow" },\n    { "id": "caption", "type": "text", "animation": "typewriter" }\n  ]\n}`;
    } else if (targetId === 'srt') {
      result = `1\n00:00:00,000 --> 00:00:03,000\n[Chuva intensa]\nA regra é clara...\n\n2\n00:00:03,500 --> 00:00:08,000\n...nunca olhe para trás.`;
    }
    
    appState.data[targetId].content = result;
    box.innerText = result;
  }, 800);
}

function exportFinal() {
  const d = appState.data;
  const pkg = `=== VIDEO PACK STUDIO: PACOTE FINAL LIMPO ===\nProjeto: ${d.brief.title || 'Sem título'}\nFormato: ${d.modelo.format} | ${d.modelo.duration}\n\n=== MEMÓRIA VISUAL ===\n${appState.visualMemory || 'Nenhuma regra estética definida.'}\n\n=== ROTEIRO ===\n${d.roteiro.content || 'Pendente'}\n\n=== JSON / REMOTION ===\n${d.json.content || 'Pendente'}\n\n=== SRT ===\n${d.srt.content || 'Pendente'}\n\n[!] Entrega pronta para CapCut, Remotion ou Editor Manual.`;
  
  appState.data.pacote.content = pkg;
  
  if (appState.activeNode === 'pacote') {
    $('out_pacote').innerText = pkg;
  } else {
    openFocusStation('pacote');
  }
}

// Init
centerMap();
renderNodes();

</script>
</body>
</html>
