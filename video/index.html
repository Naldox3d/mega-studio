<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Genesis - Video Remotion</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="module-shell">
  <header class="module-topbar">
    <div class="module-title">
      <h1>Video Remotion</h1>
      <p>Motor audiovisual para roteiro, storyboard, Remotion JSON, SRT, som e CapCut Book.</p>
    </div>
    <div class="actions-row">
      <button class="btn cyan" id="addNodeBtn" type="button">Novo Node</button>
      <button class="btn violet" id="autoLayoutBtn" type="button">Organizar</button>
      <button class="btn green" id="exportTxtBtn" type="button">TXT</button>
      <button class="btn gold" id="exportJsonBtn" type="button">JSON</button>
      <button class="btn rose" id="resetBtn" type="button">Reset</button>
    </div>
  </header>

  <main class="module-grid">
    <aside class="module-side">
      <div class="panel">
        <h3>Pipeline</h3>
        <p class="muted">Fluxo de producao audiovisual.</p>
        <div class="node-list" id="nodeList"></div>
      </div>
    </aside>

    <section class="canvas-shell">
      <div class="node-viewport" id="viewport">
        <div class="node-map" id="nodeMap">
          <svg class="connector-svg" id="connectorSvg"></svg>
          <div id="nodesCanvas"></div>
        </div>
      </div>
      <div class="canvas-tools">
        <button class="btn small" id="zoomOutBtn" type="button">-</button>
        <span class="zoom-readout" id="zoomReadout">100%</span>
        <button class="btn small" id="zoomInBtn" type="button">+</button>
        <button class="btn small cyan" id="centerBtn" type="button">Centro</button>
      </div>
      <div class="minimap" id="minimap"></div>
    </section>

    <aside class="module-inspector">
      <div class="panel">
        <h3>Diagnostico</h3>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="chip-row">
          <span class="node-status ready" id="progressText">0% pronto</span>
          <span class="node-status" id="nodeCount">0 nodes</span>
        </div>
        <p class="muted" id="activeNodeTitle">Nenhum node</p>
        <div class="message" id="moduleMessage"></div>
      </div>

      <div id="station"></div>

      <div class="panel">
        <h3>Preview IA</h3>
        <div id="imagePreview"></div>
      </div>

      <div class="panel">
        <h3>Pacote Final</h3>
        <pre class="output-box" id="nodeOutput"></pre>
        <div class="actions-row">
          <button class="btn green" id="exportTxtBtnSide" type="button">TXT</button>
          <button class="btn gold" id="exportJsonBtnSide" type="button">JSON</button>
        </div>
      </div>
    </aside>
  </main>
</div>

<script>
window.PG_MODULE_CONFIG = {
  slug: "video",
  title: "Video Remotion",
  endpoint: "/api/generate-video",
  imageSize: "1280x720",
  presets: [
    {
      title: "Briefing Audiovisual",
      type: "briefing",
      status: "working",
      briefing: "Definir produto, publico, formato, duracao e CTA do video.",
      prompts: "Cena inicial de impacto, Caruaru, energia punk elegante, campanha local."
    },
    {
      title: "Roteiro e Beats",
      type: "script",
      briefing: "Quebrar a mensagem em hooks, cenas, fala, lettering e transicoes.",
      story: "Hook de 3 segundos, prova, oferta, chamada final."
    },
    {
      title: "Storyboard",
      type: "storyboard",
      briefing: "Criar quadros principais e prompts visuais por cena.",
      prompts: "Frames cinematograficos limpos, produto claro, textura premium."
    },
    {
      title: "Remotion JSON",
      type: "remotion",
      briefing: "Gerar estrutura reutilizavel com composicoes, assets e timings.",
      motion: "Intro 2s, corpo 10s, encerramento 3s, motion limpo."
    },
    {
      title: "SRT e Audio",
      type: "audio",
      briefing: "Preparar legenda, plano de som, TTS ElevenLabs e prompt CapCut.",
      srt: "1\n00:00:00,000 --> 00:00:03,000\nPortal Genesis apresenta uma nova entrega."
    }
  ]
};
</script>
<script src="../module-shell.js"></script>
</body>
</html>
