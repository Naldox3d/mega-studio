<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>Video Pack Studio — Titan OS (Nodes Edition)</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050813; --panel: #0d1220; --panel2: #111827; --line: rgba(255,255,255,0.08);
  --gold: #d6ad68; --cyan: #65d9d2; --green: #74d99a; --red: #e18a8a; --purple: #b99cff;
  --text: #e8ecf4; --muted: #8ea0bd; 
  --glow-gold: rgba(214,173,104,0.3); --glow-cyan: rgba(101,217,210,0.3);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
body { background: radial-gradient(circle at 80% 10%, rgba(214,173,104,.05), transparent 30%), radial-gradient(circle at 20% 80%, rgba(101,217,210,.04), transparent 30%), #050813; }
button, input, textarea, select { font: inherit; outline: none; }
button { cursor: pointer; }

/* === TYPOGRAPHY & UTILS === */
h1, h2, h3, h4 { font-family: 'Syne', sans-serif; margin: 0; color: #eadcc1; letter-spacing: 0.02em; }
p { color: var(--muted); line-height: 1.6; margin: 0 0 10px 0; }
.mini { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* === BUTTONS === */
.btn { border: 1px solid var(--line); border-radius: 10px; background: rgba(255,255,255,0.03); color: var(--text); padding: 9px 16px; font-size: 12px; font-weight: 700; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; backdrop-filter: blur(4px); }
.btn:hover { filter: brightness(1.2); transform: translateY(-1px); background: rgba(255,255,255,0.08); }
.btn:active { transform: translateY(0); }
.btn.gold { background: linear-gradient(180deg, rgba(225,188,123,0.15), rgba(200,154,85,0.05)); color: var(--gold); border-color: rgba(214,173,104,.5); }
.btn.gold:hover { background: var(--gold); color: #000; }
.btn.cyan { background: rgba(101,217,210,.1); border-color: rgba(101,217,210,.35); color: var(--cyan); }
.btn.cyan:hover { background: var(--cyan); color: #000; }
.btn.green { background: rgba(116,217,154,.1); border-color: rgba(116,217,154,.4); color: var(--green); }
.btn.green:hover { background: var(--green); color: #000; }
.btn.tiny { font-size: 10px; padding: 6px 12px; border-radius: 8px; }

/* === FORMS & OUTPUTS === */
label { display: block; color: var(--gold); font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; margin: 16px 0 8px; }
input, textarea, select { width: 100%; border: 1px solid var(--line); border-radius: 12px; background: rgba(0,0,0,0.3); color: var(--text); padding: 12px; font-size: 13px; transition: all 0.2s; }
input:focus, textarea:focus, select:focus { border-color: var(--gold); background: rgba(0,0,0,0.5); box-shadow: 0 0 0 3px rgba(214,173,104,0.1); }
textarea { min-height: 120px; resize: vertical; line-height: 1.5; font-family: 'Inter', sans-serif; }
.output-box { white-space: pre-wrap; background: #03050a; border: 1px solid var(--line); border-radius: 12px; padding: 16px; font: 12px/1.6 'Space Mono', monospace; color: #dbe5ff; min-height: 150px; max-height: 400px; overflow-y: auto; position: relative; }
.output-box.empty { color: var(--muted); display: grid; place-items: center; text-align: center; font-family: 'Inter', sans-serif; }

/* === LAYOUT === */
.topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: linear-gradient(180deg, rgba(5,8,19,0.9) 0%, rgba(5,8,19,0) 100%); pointer-events: none; }
.topbar > * { pointer-events: auto; }
.brand { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 20px; color: #eadcc1; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
.brand span { color: var(--gold); font-size: 12px; font-family: 'Space Mono'; vertical-align: middle; margin-left: 8px; border: 1px solid var(--gold); padding: 2px 6px; border-radius: 4px; }

/* === CANVAS MAP === */
.nodeViewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: grab; background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.03) 1px, transparent 0); background-size: 40px 40px; }
.nodeViewport.dragging { cursor: grabbing; }
.nodeMap { position: absolute; left: 0; top: 0; transform-origin: 0 0; width: 5000px; height: 5000px; will-change: transform; }
.connectorSvg { position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: visible; }
.connectorSvg path { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 6 8; transition: stroke 0.3s; }
.connectorSvg path.active-link { stroke: rgba(214,173,104,0.5); stroke-dasharray: none; filter: drop-shadow(0 0 4px var(--glow-gold)); }

/* === NODES === */
.node { position: absolute; width: 260px; border: 1px solid var(--line); border-radius: 16px; padding: 16px; background: rgba(13,18,32,0.85); backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; user-select: none; transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s; z-index: 5; }
.node:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.2); }
.node.nodeDragging { cursor: grabbing; z-index: 50; transform: scale(1.02); border-color: var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 0 1px var(--gold); }
.node.activeNode { border-color: var(--cyan); box-shadow: 0 0 0 1px var(--cyan), 0 15px 40px rgba(0,0,0,0.8); z-index: 10; background: rgba(18,24,40,0.95); }

.nodeHeader { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--line); padding-bottom: 12px; }
.nodeIcon { width: 40px; height: 40px; display: grid; place-items: center; border-radius: 12px; background: rgba(255,255,255,0.03); font-size: 18px; border: 1px solid var(--line); flex-shrink: 0; }
.node h3 { font-size: 15px; margin: 0 0 4px 0; line-height: 1.2; }
.nodeStatus { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 800; display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; background: rgba(0,0,0,0.3); border-radius: 4px; border: 1px solid var(--line); }
.nodeSummary { font-size: 12px; color: var(--muted); line-height: 1.5; min-height: 36px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Node States Colors */
.node.state-done { border-color: rgba(116,217,154,0.3); }
.node.state-done .nodeIcon { background: rgba(116,217,154,0.1); border-color: rgba(116,217,154,0.3); color: var(--green); }
.node.state-done .nodeStatus { color: var(--green); border-color: rgba(116,217,154,0.3); background: rgba(116,217,154,0.05); }

.node.state-locked { opacity: 0.6; filter: grayscale(0.5); pointer-events: none; }
.node.state-locked .nodeIcon { background: rgba(0,0,0,0.5); }

/* === FOCUS STATION (MODAL) === */
.focusOverlay { position: fixed; inset: 0; background: rgba(2,3,7,0.8); backdrop-filter: blur(8px); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
.focusOverlay.active { opacity: 1; pointer-events: auto; }

.focusStation { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -48%) scale(0.98); width: 92vw; max-width: 1200px; height: 85vh; background: var(--panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 40px 100px rgba(0,0,0,0.9), 0 0 0 1px rgba(0,0,0,0.5); z-index: 100; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); overflow: hidden; }
.focusStation.active { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }

.fs-header { padding: 16px 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
.fs-header h2 { font-size: 22px; margin: 0; display: flex; align-items: center; gap: 12px; }
.fs-badge { font-size: 10px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--line); color: var(--muted); text-transform: uppercase; font-weight: 800; letter-spacing: 0.1em; background: rgba(0,0,0,0.3); }

.fs-body { display: flex; flex: 1; overflow: hidden; }
.fs-main { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; }
.fs-sidebar { width: 360px; border-left: 1px solid var(--line); background: rgba(0,0,0,0.2); padding: 24px; overflow-y: auto; display: flex; flex-direction: column; }

/* Visual Memory Panel */
.visualDrop { border: 1px dashed rgba(101,217,210,0.4); border-radius: 12px; background: rgba(101,217,210,0.03); padding: 30px 20px; text-align: center; color: var(--cyan); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: block; margin-bottom: 16px; }
.visualDrop:hover { background: rgba(101,217,210,0.1); border-color: var(--cyan); }
.visualDrop input { display: none; }
.visualGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
.visualThumb { aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: #000; border: 1px solid var(--line); position: relative; }
.visualThumb img { width: 100%; height: 100%; object-fit: cover; }
.visualThumb.empty-slot { display: grid; place-items: center; font-size: 10px; color: var(--muted); font-family: 'Space Mono'; border-style: dashed; }

/* Settings Modal */
.settings-modal { position: absolute; top: 70px; right: 24px; background: var(--panel2); border: 1px solid var(--line); border-radius: 16px; padding: 20px; width: 320px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); z-index: 105; display: none; }
.settings-modal.active { display: block; }

/* Floating Controls */
.controls-panel { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 80; background: rgba(5,8,19,0.8); padding: 8px 12px; border-radius: 100px; border: 1px solid var(--line); backdrop-filter: blur(10px); }
.zoom-readout { display: grid; place-items: center; padding: 0 12px; font: 12px 'Space Mono', monospace; color: var(--muted); }

@media(max-width: 900px) {
  .fs-body { flex-direction: column; }
  .fs-sidebar { width: 100%; border-left: none; border-top: 1px solid var(--line); max-height: 40vh; }
  .node { width: 220px; }
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">Video Pack Studio <span>TITAN OS</span></div>
  <div style="display: flex; gap: 12px;">
    <button class="btn" onclick="toggleSettings()">⚙️ API</button>
    <button class="btn" onclick="reorganizeMind()">⟲ Organizar</button>
  </div>
</header>

<div class="settings-modal" id="settingsModal">
  <h3>Configuração de API</h3>
  <p class="mini">Por padrão, usamos o gerador local Mock. Configure aqui se tiver backend próprio.</p>
  <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
    <input type="checkbox" id="api_toggle" style="width:auto; margin:0;" onchange="appState.config.useApi = this.checked"> 
    <span style="font-size:12px; color:var(--text); text-transform:none;">Usar API Real</span>
  </label>
  <label>Endpoint URL</label>
  <input type="text" id="api_endpoint" placeholder="https://seu-backend.com/api/generate" oninput="appState.config.endpoint = this.value">
  <button class="btn cyan" style="width:100%; margin-top:16px;" onclick="toggleSettings()">Salvar & Fechar</button>
</div>

<div class="shell">
  <!-- Core Canvas Area -->
  <div class="nodeViewport" id="viewport">
    <div class="nodeMap" id="nodeMap">
      <svg class="connectorSvg" id="svgLayer"></svg>
      <div id="nodesContainer"></div>
    </div>
  </div>

  <!-- Focus Overlay & Station -->
  <div class="focusOverlay" id="focusOverlay" onclick="closeFocusStation(event)"></div>
  
  <div class="focusStation" id="focusStation">
    <div class="fs-header">
      <h2><span id="fsIcon"></span> <span id="fsTitle">Briefing Mestre</span> <span class="fs-badge" id="fsStatus">Editando</span></h2>
      <button class="btn" onclick="closeFocusStation(event, true)">✕ Voltar ao Mapa</button>
    </div>
    <div class="fs-body">
      <div class="fs-main" id="fsMainContent">
        <!-- Injected via JS -->
      </div>
      <aside class="fs-sidebar">
        <h3>🖼️ Cérebro Visual</h3>
        <p class="mini">Faça upload de storyboard, animes ou paletas. A IA usará isso como base estética para os prompts.</p>
        <label class="visualDrop">
          + Soltar Imagens de Referência
          <input type="file" accept="image/*" multiple onchange="handleImageUpload(this)">
        </label>
        <div class="visualGrid" id="visualGrid"></div>
        
        <label>Análise / Moodboard Extraído</label>
        <textarea id="visualMemory" placeholder="Clique em Analisar para a IA descrever a estética do projeto..." oninput="appState.visual.memory = this.value"></textarea>
        <button class="btn cyan" style="width:100%; margin-top:8px;" onclick="analyzeVisuals()">Analisar com IA</button>
      </aside>
    </div>
  </div>
  
  <!-- Floating Canvas Controls -->
  <div class="controls-panel">
    <button class="btn tiny" onclick="zoomMap(-0.1)">-</button>
    <span class="zoom-readout" id="zoomReadout">100%</span>
    <button class="btn tiny" onclick="zoomMap(0.1)">+</button>
    <button class="btn tiny" onclick="centerMap()">Centralizar</button>
  </div>
</div>

<script>
/**
 * TITAN OS - ULTIMATE CORE
 * Arquitetura baseada em State (appState) -> Render -> DOM.
 */
const $ = id => document.getElementById(id);

// --- GLOBAL STATE ---
const appState = {
  zoom: 1, panX: 0, panY: 0,
  activeNode: null,
  config: { useApi: false, endpoint: '' },
  visual: { refs: [], memory: '' },
  data: {
    brief: { title: '', goal: 'Vender / Promoção', tone: 'Impactante', desc: '', req: '', template: 'Motion Comic 2D', format: '9:16 Vertical', duration: '30 segundos', motion: 'Câmera seca / Tensão' },
    mestre: { content: '' },
    roteiro: { content: '' },
    json: { content: '' },
    srt: { content: '' },
    pacote: { content: '' }
  },
  nodesDef: [
    { id: 'brief', title: 'Briefing & Estrutura', icon: '🧠', x: 100, y: 150, dependsOn: null, desc: 'A base do projeto. Define ideia, formato e modelo.' },
    { id: 'mestre', title: 'Pacote Mestre', icon: '📦', x: 450, y: 150, dependsOn: 'brief', desc: 'Diagnóstico criativo central expandido pela IA.' },
    { id: 'roteiro', title: 'Roteiro Visual', icon: '🎞️', x: 800, y: 50, dependsOn: 'mestre', desc: 'Shot list detalhado e script de cena a cena.' },
    { id: 'json', title: 'JSON / CapCut', icon: '</>', x: 1150, y: 50, dependsOn: 'roteiro', desc: 'Estrutura técnica para editores ou IA de geração.' },
    { id: 'srt', title: 'SRT & Sound Plan', icon: '🎧', x: 800, y: 250, dependsOn: 'mestre', desc: 'Legendas com timing e engenharia de som/SFX.' },
    { id: 'pacote', title: 'Exportação Limpa', icon: '🚀', x: 1150, y: 250, dependsOn: ['json', 'srt'], desc: 'Compilação final limpa e pronta para entrega.' }
  ]
};

// --- DRAG & DROP & ZOOM ---
let isDraggingMap = false, isDraggingNode = false, draggedNodeId = null, startX, startY;
const viewport = $('viewport'), nodeMap = $('nodeMap');

viewport.addEventListener('mousedown', e => {
  if (e.target.closest('button, input, textarea, select')) return;
  const node = e.target.closest('.node');
  if (node) {
    if(node.classList.contains('state-locked')) return; // Can't drag locked nodes
    isDraggingNode = true;
    draggedNodeId = node.dataset.id;
    const n = appState.nodesDef.find(x => x.id === draggedNodeId);
    startX = e.clientX - (n.x * appState.zoom);
    startY = e.clientY - (n.y * appState.zoom);
    node.classList.add('nodeDragging');
  } else {
    isDraggingMap = true;
    startX = e.clientX - appState.panX;
    startY = e.clientY - appState.panY;
    viewport.classList.add('dragging');
  }
});

window.addEventListener('mousemove', e => {
  if (isDraggingMap) {
    appState.panX = e.clientX - startX;
    appState.panY = e.clientY - startY;
    updateTransform();
  } else if (isDraggingNode && draggedNodeId) {
    const n = appState.nodesDef.find(x => x.id === draggedNodeId);
    n.x = (e.clientX - startX) / appState.zoom;
    n.y = (e.clientY - startY) / appState.zoom;
    $(`node-${n.id}`).style.left = `${n.x}px`;
    $(`node-${n.id}`).style.top = `${n.y}px`;
    drawConnectors();
  }
});

window.addEventListener('mouseup', () => {
  isDraggingMap = false; isDraggingNode = false; draggedNodeId = null;
  viewport.classList.remove('dragging');
  document.querySelectorAll('.node').forEach(n => n.classList.remove('nodeDragging'));
});

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  zoomMap(e.deltaY > 0 ? -0.05 : 0.05, e.clientX, e.clientY);
}, { passive: false });

function zoomMap(delta, cx = viewport.clientWidth/2, cy = viewport.clientHeight/2) {
  const oldZoom = appState.zoom;
  appState.zoom = Math.max(0.3, Math.min(2.5, appState.zoom + delta));
  const rect = viewport.getBoundingClientRect();
  const ox = cx - rect.left, oy = cy - rect.top;
  appState.panX = ox - (ox - appState.panX) * (appState.zoom / oldZoom);
  appState.panY = oy - (oy - appState.panY) * (appState.zoom / oldZoom);
  updateTransform();
}

function updateTransform() {
  nodeMap.style.transform = `translate(${appState.panX}px, ${appState.panY}px) scale(${appState.zoom})`;
  $('zoomReadout').innerText = `${Math.round(appState.zoom * 100)}%`;
}

function centerMap() {
  appState.zoom = 1; appState.panX = 50; appState.panY = 50;
  updateTransform();
}

function reorganizeMind() {
  const base = { brief: [100,150], mestre: [450,150], roteiro: [800,50], json: [1150,50], srt: [800,250], pacote: [1150,250] };
  appState.nodesDef.forEach(n => { n.x = base[n.id][0]; n.y = base[n.id][1]; });
  renderNodes(); centerMap();
}

// --- RENDER LOGIC ---
function isNodeUnlocked(id) {
  const n = appState.nodesDef.find(x => x.id === id);
  if (!n.dependsOn) return true;
  const deps = Array.isArray(n.dependsOn) ? n.dependsOn : [n.dependsOn];
  // Node is unlocked if ALL its dependencies are "done"
  return deps.every(dep => {
    if(dep === 'brief') return appState.data.brief.desc.trim().length > 0;
    return appState.data[dep].content.trim().length > 0;
  });
}

function getNodeStatusInfo(id) {
  if (!isNodeUnlocked(id)) return { cls: 'state-locked', text: '🔒 Bloqueado' };
  
  const d = appState.data[id];
  if (id === 'brief') return d.desc ? { cls: 'state-done', text: '✓ Pronto' } : { cls: 'state-editing', text: '○ Editar' };
  return d.content ? { cls: 'state-done', text: '✓ Gerado' } : { cls: 'state-empty', text: '○ Pendente' };
}

function renderNodes() {
  $('nodesContainer').innerHTML = appState.nodesDef.map(n => {
    const status = getNodeStatusInfo(n.id);
    const isActive = appState.activeNode === n.id ? 'activeNode' : '';
    return `
      <div class="node ${status.cls} ${isActive}" id="node-${n.id}" data-id="${n.id}" style="left:${n.x}px; top:${n.y}px" onclick="openFocusStation('${n.id}')">
        <div class="nodeHeader">
          <div class="nodeIcon">${n.icon}</div>
          <div>
            <h3>${n.title}</h3>
            <span class="nodeStatus">${status.text}</span>
          </div>
        </div>
        <div class="nodeSummary">${n.desc}</div>
      </div>
    `;
  }).join('');
  drawConnectors();
}

function drawConnectors() {
  let paths = '';
  appState.nodesDef.forEach(target => {
    if (!target.dependsOn) return;
    const deps = Array.isArray(target.dependsOn) ? target.dependsOn : [target.dependsOn];
    deps.forEach(depId => {
      const source = appState.nodesDef.find(n => n.id === depId);
      if (!source) return;
      
      const sx = source.x + 260; // node width
      const sy = source.y + 60;  // approx center Y
      const tx = target.x;
      const ty = target.y + 60;
      
      const dist = Math.abs(tx - sx);
      const cx1 = sx + (dist * 0.5), cy1 = sy;
      const cx2 = tx - (dist * 0.5), cy2 = ty;
      
      const sUnlocked = isNodeUnlocked(target.id); // target unlocked means source is done
      const cssClass = sUnlocked ? 'active-link' : '';

      paths += `<path class="${cssClass}" d="M ${sx} ${sy} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${tx} ${ty}" />`;
    });
  });
  $('svgLayer').innerHTML = paths;
}

// --- FOCUS STATION ---
function toggleSettings() {
  $('settingsModal').classList.toggle('active');
}

function openFocusStation(id) {
  if(!isNodeUnlocked(id)) {
    // Cannot open locked node
    return;
  }
  
  appState.activeNode = id;
  const n = appState.nodesDef.find(x => x.id === id);
  $('fsIcon').innerText = n.icon;
  $('fsTitle').innerText = n.title;
  $('fsStatus').innerText = getNodeStatusInfo(id).text.replace(/[✓○🔒]\s/g, '');
  
  const main = $('fsMainContent');
  const d = appState.data;
  
  if (id === 'brief') {
    main.innerHTML = `
      <div class="grid-2">
        <div>
          <label>Título do Projeto</label>
          <input type="text" value="${d.brief.title}" placeholder="Ex: Campanha Dark Neon" oninput="appState.data.brief.title=this.value">
        </div>
        <div>
          <label>Objetivo</label>
          <select onchange="appState.data.brief.goal=this.value">
            <option ${d.brief.goal.includes('Vender')?'selected':''}>Vender / Promoção</option>
            <option ${d.brief.goal.includes('Narrativa')?'selected':''}>Cena Narrativa</option>
            <option ${d.brief.goal.includes('Curiosidade')?'selected':''}>Curiosidade Viral</option>
          </select>
        </div>
      </div>
      <div class="grid-2">
        <div><label>Formato Visual</label><select onchange="appState.data.brief.template=this.value"><option ${d.brief.template==='Motion Comic 2D'?'selected':''}>Motion Comic 2D</option><option ${d.brief.template==='Produto Animado'?'selected':''}>Produto Animado</option><option ${d.brief.template==='Cinematic Realism'?'selected':''}>Cinematic Realism</option></select></div>
        <div><label>Proporção</label><select onchange="appState.data.brief.format=this.value"><option ${d.brief.format.includes('9:16')?'selected':''}>9:16 Vertical</option><option ${d.brief.format.includes('16:9')?'selected':''}>16:9 Horizontal</option></select></div>
        <div><label>Duração Média</label><select onchange="appState.data.brief.duration=this.value"><option ${d.brief.duration.includes('15')?'selected':''}>15 segundos</option><option ${d.brief.duration.includes('30')?'selected':''}>30 segundos</option><option ${d.brief.duration.includes('60')?'selected':''}>60 segundos</option></select></div>
        <div><label>Ritmo / Câmera</label><select onchange="appState.data.brief.motion=this.value"><option ${d.brief.motion.includes('Câmera seca')?'selected':''}>Câmera seca / Tensão</option><option ${d.brief.motion.includes('Motion Graphic')?'selected':''}>Motion Graphic Fluido</option><option ${d.brief.motion.includes('Snap Cuts')?'selected':''}>Anime Snap Cuts</option></select></div>
      </div>
      <label>Briefing / Roteiro Bruto</label>
      <textarea placeholder="Cole a ideia, roteiro bruto ou história aqui..." oninput="appState.data.brief.desc=this.value">${d.brief.desc}</textarea>
      <label>Frases Obrigatórias / CTA</label>
      <textarea placeholder="Textos que não podem faltar..." style="min-height:80px" oninput="appState.data.brief.req=this.value">${d.brief.req}</textarea>
    `;
  } else if (id === 'pacote') {
    main.innerHTML = `
      <p>Revisão final de todos os nodes para entrega.</p>
      <div class="flex-between" style="margin-bottom:12px;">
        <button class="btn green" onclick="runGenerator('${id}')">📦 Montar Pacote Limpo</button>
        <button class="btn" onclick="copyOutput('${id}')">Copiar Texto</button>
      </div>
      <div class="output-box ${!d[id].content ? 'empty' : ''}" id="out_${id}">${d[id].content || 'Nenhum pacote montado.'}</div>
    `;
  } else {
    // For Mestre, Roteiro, JSON, SRT
    const btnLabels = { mestre: 'Gerar Pacote Mestre', roteiro: 'Gerar Roteiro Visual', json: 'Gerar JSON & Prompts', srt: 'Gerar SRT & Plano Som' };
    main.innerHTML = `
      <p>Estação técnica guiada por IA. Herda o Briefing e a Memória Visual.</p>
      <div class="flex-between" style="margin-bottom:12px;">
        <button class="btn gold" onclick="runGenerator('${id}')">✨ ${btnLabels[id]}</button>
        <button class="btn" onclick="copyOutput('${id}')">Copiar Texto</button>
      </div>
      <div class="output-box ${!d[id].content ? 'empty' : ''}" id="out_${id}">${d[id].content || 'Aguardando geração...'}</div>
    `;
  }

  $('focusOverlay').classList.add('active');
  $('focusStation').classList.add('active');
  renderNodes(); 
  renderVisualMemory();
}

function closeFocusStation(e, force = false) {
  if (!force && e && e.target !== $('focusOverlay')) return;
  $('focusOverlay').classList.remove('active');
  $('focusStation').classList.remove('active');
  appState.activeNode = null;
  renderNodes();
}

// --- VISUAL MEMORY ---
function handleImageUpload(input) {
  const files = Array.from(input.files).slice(0, 4);
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      appState.visual.refs.push(e.target.result);
      renderVisualMemory();
    };
    reader.readAsDataURL(f);
  });
}

function renderVisualMemory() {
  const grid = $('visualGrid');
  if (appState.visual.refs.length === 0) {
    grid.innerHTML = `<div class="visualThumb empty-slot">Slot 1</div><div class="visualThumb empty-slot">Slot 2</div>`;
  } else {
    grid.innerHTML = appState.visual.refs.map(src => `<div class="visualThumb"><img src="${src}"></div>`).join('');
  }
  $('visualMemory').value = appState.visual.memory;
}

function analyzeVisuals() {
  const txt = "ESTÉTICA ANALISADA:\n- Iluminação: Alto contraste, luz dura, neons dramáticos.\n- Composição: Planos detalhe intensos (Extreme Close-ups).\n- Cores: Cyberpunk/Horror (Cyan esmeralda, vermelho sangue, preto profundo).\n\n-> Diretriz IA: Aplicar textura cinematográfica (film grain) e rejeitar visuais corporativos planos.";
  $('visualMemory').value = txt;
  appState.visual.memory = txt;
}

// --- GENERATOR LOGIC (MOCK IA LOCAL) ---
function runGenerator(targetId) {
  const box = $(`out_${targetId}`);
  box.classList.remove('empty');
  box.innerText = "Sintetizando contexto visual e briefing...";
  
  setTimeout(() => {
    let result = '';
    const b = appState.data.brief;
    const title = b.title || "Projeto Sem Título";
    const dur = parseInt(b.duration) || 30;
    const mid = Math.round(dur/2);
    
    if (targetId === 'mestre') {
      result = `## DIAGNÓSTICO CRIATIVO\nProjeto: ${title}\nFormato: ${b.format} | ${b.duration}\nEstilo: ${b.template}\nRitmo: ${b.motion}\n\n## CONCEITO VISUAL\n${b.desc || 'Conceito não definido.'}\n\n## ESTRUTURA RECOMENDADA\n1. Hook (0-3s): Estabelecer o universo visual instantaneamente.\n2. Tensão (3-${mid}s): Desenvolver o problema/mistério.\n3. Clímax (${mid}-${dur}s): Revelação final e CTA.\n\n-> Próximo Passo: Abra o Roteiro Visual.`;
    } 
    else if (targetId === 'roteiro') {
      result = `## ROTEIRO VISUAL - ${title}\n\n### CENA 01 - HOOK (00:00 - 00:03)\n- Visual: Plano fechado, estética ${b.template}. Iluminação focada.\n- Movimento: ${b.motion}.\n- Texto: "${b.req ? b.req.split('\n')[0] : 'Início...'}"\n\n### CENA 02 - DESENVOLVIMENTO (00:03 - 00:${mid})\n- Visual: Expansão do ambiente. Elemento central revelado.\n- Movimento: Slow push-in ou tracking shot.\n\n### CENA 03 - PAYOFF (00:${mid} - 00:${dur})\n- Visual: Corte rápido para o produto/marca.\n- CTA: "Compre agora / Assista a parte 2".`;
    } 
    else if (targetId === 'json') {
      result = `// INSTRUÇÕES TÉCNICAS (REMOTION / CAPCUT PROMPT)\n{\n  "project": "${title}",\n  "engine": "video-pack-studio",\n  "format": "${b.format}",\n  "duration_sec": ${dur},\n  "scenes": [\n    {\n      "id": 1,\n      "time": "0-3s",\n      "action": "Abertura impactante baseada no estilo ${b.template}",\n      "layers": ["background_video", "overlay_text", "sfx_impact"]\n    },\n    {\n      "id": 2,\n      "time": "3-${dur}s",\n      "action": "Desenvolvimento e revelação",\n      "layers": ["main_asset", "caption", "sfx_riser"]\n    }\n  ],\n  "prompt_ia": "Generate video: ${b.template} style, ${b.motion}, cinematic lighting. Context: ${appState.visual.memory ? 'Use visual memory guidelines.' : 'Default aesthetics.'}"\n}`;
    } 
    else if (targetId === 'srt') {
      result = `## SRT (LEGENDAS)\n1\n00:00:00,000 --> 00:00:03,000\n[SFX: Impacto Grave]\nAtenção aqui.\n\n2\n00:00:03,500 --> 00:00:10,000\n[SFX: Riser subindo de volume]\n${b.req || 'Texto principal da narrativa.'}\n\n## PLANO DE SOM E SFX\n- Ambiente: Drone escuro contínuo.\n- Impactos: Whoosh hits nas transições de câmera.\n- Mix: Locução central clara, SFX em estéreo (-6db).`;
    } 
    else if (targetId === 'pacote') {
      result = `=======================================\nVIDEO PACK STUDIO: PACOTE FINAL LIMPO\n=======================================\nProjeto: ${title}\nFormato: ${b.format} | ${b.duration}\n\n[MEMÓRIA VISUAL APLICADA]\n${appState.visual.memory || 'Nenhuma regra estética forçada.'}\n\n[ROTEIRO]\n${appState.data.roteiro.content}\n\n[JSON / INSTRUÇÕES]\n${appState.data.json.content}\n\n[ÁUDIO / SRT]\n${appState.data.srt.content}\n\n>> Pacote pronto para editor manual ou pipeline IA.`;
    }
    
    appState.data[targetId].content = result;
    box.innerText = result;
    
    // Auto-update nodes UI
    renderNodes();
  }, 600);
}

function copyOutput(id) {
  const text = appState.data[id].content;
  if(text) navigator.clipboard.writeText(text).then(() => alert('Copiado para a área de transferência!'));
}

// Init
centerMap();
renderNodes();

</script>
</body>
</html>
