<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Genesis Profissional</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>Portal Genesis Profissional</h1>
  </header>
  <aside>
    <div class="login-box">
      <input type="text" id="admin-user" placeholder="Usuário">
      <input type="password" id="admin-pass" placeholder="Senha">
      <button id="login-btn">Entrar</button>
    </div>
    <div class="api-buttons">
      <button data-api="claude">Claude/Gemini</button>
      <button data-api="pollinations">Pollinations</button>
      <button data-api="flux">Flux</button>
      <button data-api="ltx">LTX</button>
      <button data-api="eleven">ElevenLabs</button>
      <button data-api="srt">SRT</button>
    </div>
  </aside>
  <main>
    <textarea id="prompt-input" placeholder="Digite seu prompt aqui..."></textarea>
    <button id="generate-btn">Gerar</button>
    <div id="result-output"></div>
    <div id="log-output"></div>
    <div id="history-output"></div>
  </main>
</div>

<script src="main.js"></script>
</body>
</html>
