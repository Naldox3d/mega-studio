<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEGA STUDIO 46.0 — A MÁQUINA DEFINITIVA</title>
    <style>
        :root {
            --bg: #0b0e14; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --text-dim: #8b949e; --primary: #58a6ff;
            --purple: #bc8cff; --green: #3fb950; --red: #f85149; --orange: #f69d50;
            --grad: linear-gradient(135deg, #f85149 0%, #d2a8ff 100%);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .app-container { max-width: 1200px; width: 100%; display: grid; gap: 15px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 32px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; text-transform: uppercase; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
        .full { grid-column: 1 / -1; }
        .panel-title { font-size: 12px; text-transform: uppercase; font-weight: bold; color: var(--primary); margin-bottom: 15px; border-bottom: 1px dashed var(--border); padding-bottom: 8px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; }
        select, input, textarea { width: 100%; background: #010409; border: 1px solid var(--border); color: #58a6ff; padding: 12px; border-radius: 6px; font-size: 14px; outline: none; }
        textarea { resize: vertical; min-height: 100px; font-family: monospace; color: var(--green); }
        button { background: var(--grad); color: #fff; border: none; padding: 18px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.2s; }
        button.success { background: var(--green); color: #000; margin-top: 10px; font-size: 16px; border: 1px solid #000; }
        #prompt-output { height: 320px; background: #000; color: #ff7b72; border-color: var(--red); font-size: 13px; }
        .cena-bloco { border-left: 4px solid var(--primary); padding: 15px; margin-bottom: 15px; background: #1c2128; border-radius: 0 6px 6px 0; }
        .tag-cena { color: var(--orange); font-weight: bold; display: block; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .tag-dna { color: var(--text-dim); font-size: 12px; font-style: italic; display: block; margin-bottom: 5px; }
        .tag-voz { color: var(--purple); font-weight: bold; font-size: 12px; display: block; }
        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>🎥 MEGA STUDIO 46.0</h1>
        <p style="font-size: 11px; color: var(--text-dim); letter-spacing: 2px;">SISTEMA DE GERAÇÃO DEFINITIVA — ACERVO FULL</p>
    </div>

    <div class="grid-2">
        <div class="panel">
            <div class="panel-title">📂 1. DIRETRIZES DE MUNDO</div>
            <label>Nicho do Projeto</label>
            <select id="ctrl-nicho" style="margin-bottom: 15px;"><option value="">-- Escolha o Mundo --</option></select>
            <label>Ponto de Renderização</label>
            <select id="ctrl-cenario" disabled><option value="">-- Aguardando Nicho --</option></select>
        </div>

        <div class="panel">
            <div class="panel-title">🎥 2. ÓPTICA E ESTÉTICA</div>
            <label>Lente e Ângulo</label>
            <select id="ctrl-lente" style="margin-bottom: 15px;"></select>
            <label>Motor de Estilo</label>
            <select id="ctrl-estilo"></select>
        </div>
    </div>

    <div class="panel full">
        <label>DETALHAMENTO DO AMBIENTE (AUTO-GEN)</label>
        <textarea id="ctrl-cenario-texto" placeholder="Aguardando seleção de mundo..."></textarea>
    </div>

    <div class="panel full">
        <div class="panel-title" style="color: var(--purple);">👥 3. ELENCO, DNA E VOZES</div>
        <div class="grid-4">
            <div><label>Protagonista</label><select id="ctrl-prota"></select></div>
            <div><label>Coadjuvante 1</label><select id="ctrl-coadj1"></select></div>
            <div><label>Coadjuvante 2</label><select id="ctrl-coadj2"></select></div>
            <div><label>Multidão</label><select id="ctrl-multi"></select></div>
        </div>
    </div>

    <div class="grid-2">
        <div class="panel">
            <div class="panel-title" style="color: var(--orange);">🧍 4. MOVIMENTO (MOTION)</div>
            <label>Pose de Ação</label>
            <select id="ctrl-pose" style="margin-bottom: 15px;"></select>
            <label>Movimento da Câmera</label>
            <select id="ctrl-motion"></select>
        </div>

        <div class="panel" style="border-color: var(--green);">
            <div class="panel-title" style="color: var(--green);">🎬 5. MÁQUINA VIRAL</div>
            <label>Modelo de Script</label>
            <select id="ctrl-roteiro" style="margin-bottom: 15px;"></select>
            <button id="btn-gerar" class="success">🚀 EXECUTAR GERAÇÃO COMPLETA</button>
        </div>
    </div>

    <div class="panel full">
        <div class="panel-title" style="color: var(--red);">💻 6. TERMINAL DE PROMPT FINAL (8K)</div>
        <textarea id="prompt-output" readonly></textarea>
        <button id="btn-copiar" style="margin-top: 10px; background: #333;">COPIAR PROMPT</button>
    </div>

    <div class="panel full">
        <div class="panel-title">📜 7. STORYBOARD FATIADO (CENA A CENA)</div>
        <div id="storyboard-output"></div>
    </div>
</div>

<script>
const DB = {
    nichos: {
        "CLIP": { label: "🎵 Videoclipe Musical", cenas: {
            "FRUITS": ["Visão Panorâmica da Ilha|Panoramic tropical volcanic island, fruit-shaped mountains", "Balsa de Melancia|Heroes on a raft made of watermelon slice", "Vulcão Frutal|Concert stage on the edge of a fruit-vibe volcano"],
            "RAP": ["Beco com Grafite|Dark alleyway filled with colorful graffiti, neon lights", "Carro Rebaixado|Low angle shot, luxury car headlights shining through smoke"]
        }},
        "COMEDIA": { label: "😂 Comédia & Besteirol", cenas: {
            "SÁTIRA": ["Festa Frat|Crazy college frat party, red cups, neon lights", "Corredor Escola|Classic high school hallway, lockers", "Casa Armadilhas|House interior with funny silly traps"]
        }},
        "SHOPPING": { label: "🏬 Shopping Noturno", cenas: {
            "ÁREAS": ["Escada Rolante|Stopped escalator in a dark empty mall", "Praça Alimentação|Massive empty food court at night", "Docas|Industrial loading dock at night, wet asphalt"]
        }},
        "ANIMES": { label: "💥 Animes & Mangá", cenas: {
            "SHONEN": ["Arena Torneio|Massive anime martial arts arena, action lines", "Ruínas de Batalha|Destroyed rocky wasteland after massive energy blast"]
        }},
        "TERROR": { label: "👻 Terror & Assombração", cenas: {
            "LIMITES": ["Casa Abandonada|Creepy abandoned old house, dark shadows", "Shopping Infinito|Endless empty white shopping mall, fluorescent lights"]
        }},
        "SCIFI": { label: "🛸 Sci-Fi / Cyberpunk", cenas: {
            "FUTURO": ["Rua Neon|Cyberpunk city street, neon holograms", "Nave Mãe|Inside a massive high-tech alien mothership"]
        }}
    },
    personagens: {
        "P01": { nome: "Limão Rocha", dna: "Anthropomorphic Lemon, scarred face, tactical vest", voz: "Masculina grave e rouca, estilo durão." },
        "P02": { nome: "Tomate Elinaldo", dna: "Anthropomorphic Tomato, sweating, detective coat", voz: "Masculina anasalada, com gaguejos nervosos." },
        "P03": { nome: "Sabrina Pitaya", dna: "Cyberpunk Pitaya, glowing scales", voz: "Feminina, timbre futurista e confiante." },
        "P04": { nome: "Pr. Uva Passa", dna: "Wrinkled raisin, wise serene expression", voz: "Masculina idosa, voz fraca e serena." },
        "P05": { nome: "Bananildo Musculoso", dna: "Muscular Banana, gold chains", voz: "Masculina grave, estilo fisiculturista eufórico." },
        "V01": { nome: "Maçã Caveira", dna: "Red peeled apple, skull-face, dark velvet cape", voz: "Voz cavernosa e arrastada." },
        "V02": { nome: "Banana Palhaço", dna: "Pale banana, creepy clown makeup", voz: "Fina, esganiçada e maníaca." },
        "COM01": { nome: "Caju Nordestino", dna: "Cashew fruit, colorful rustic vest", voz: "Masculina, sotaque nordestino, carismática." },
        "A06": { nome: "Abacate Lutador Z", dna: "Avocado, spiky glowing yellow hair, martial arts gi", voz: "Confiante e poderosa." },
        "M01": { nome: "Saxofonista Mascarado", dna: "Character in gold mask, holding glowing saxophone", voz: "Sem voz, apenas solo de saxofone intenso." }
    },
    multidoes: { "FÃS": "Multidão de Fãs / Paparazzi", "ZUMBIS": "Horda de Zumbis de Frutas", "FESTA": "Convidados Elegantes em Festa" },
    poses: { 
        "RAP": "Aggressive rap pose, hand gestures matching the beat", 
        "HERO_LANDING": "Epic superhero landing, one knee on ground, debris flying",
        "VIRAL_DANCE": "Frontal static camera, viral dance choreography",
        "WALK_EXPLOSION": "Walking away in slow motion, ignoring an explosion"
    },
    motions: { 
        "TRACKING": "Fast tracking camera following the subject, motion blur", 
        "ORBIT": "Orbiting 360 camera spinning slowly around characters",
        "DRONE": "Drone fly-through pushing forward through the scene",
        "CINEMATIC_PAN": "Slow cinematic pan to the right, dynamic light shifts"
    },
    lentes: { "WIDE_24MM": "Wide shot, 24mm lens. Cinematic establishing shot", "MEDIUM_50MM": "Medium shot, 50mm lens. Focus on expression", "MACRO_85MM": "Extreme close-up, macro lens, 85mm", "CRASH_ZOOM": "Crash zoom, fast comedic timing, wide angle lens" },
    estilos: { 
        "HIBRIDO": "Hybrid style, hyper-realistic Live Action environment with 3D stylized 'Cartoon Elinaldo V1' characters, 8k", 
        "ORIGINAL_3D": "3D Stylized character, signature style of Cartoon Elinaldo V1, highly vibrant colors",
        "ANIME_2D": "Anime style, 2D cel-shaded, Studio Ghibli influence"
    },
    roteiros: {
        "PLANETA_RAP": ["Hook: Close-up extremo no rosto com batida forte de morro.", "Solo Sax: Câmera se afasta e o Saxofonista Mascarado assume a cena.", "Ação: Movimentação rítmica intensa gesticulando no flow.", "Clímax: Pose épica no drop final da batida com luzes neon."],
        "PLOT_TWIST": ["Build: Cena super tensa e séria com trilha de suspense.", "Action: Personagem age como se algo perigoso fosse ocorrer.", "Twist: Situação revela algo ridículo ou fútil.", "Final: Cara de tacho do personagem com trilha cômica."]
    }
};

const ui = {
    nicho: document.getElementById("ctrl-nicho"),
    cenario: document.getElementById("ctrl-cenario"),
    cenarioTexto: document.getElementById("ctrl-cenario-texto"),
    lente: document.getElementById("ctrl-lente"),
    estilo: document.getElementById("ctrl-estilo"),
    prota: document.getElementById("ctrl-prota"),
    coadj1: document.getElementById("ctrl-coadj1"),
    coadj2: document.getElementById("ctrl-coadj2"),
    multi: document.getElementById("ctrl-multi"),
    pose: document.getElementById("ctrl-pose"),
    motion: document.getElementById("ctrl-motion"),
    roteiro: document.getElementById("ctrl-roteiro"),
    btnGerar: document.getElementById("btn-gerar"),
    btnCopiar: document.getElementById("btn-copiar"),
    promptOut: document.getElementById("prompt-output"),
    storyboardOut: document.getElementById("storyboard-output")
};

function init() {
    Object.entries(DB.nichos).forEach(([k, v]) => ui.nicho.add(new Option(v.label, k)));
    Object.entries(DB.lentes).forEach(([k, v]) => ui.lente.add(new Option(k, v)));
    Object.entries(DB.estilos).forEach(([k, v]) => ui.estilo.add(new Option(k, v)));
    Object.entries(DB.poses).forEach(([k, v]) => ui.pose.add(new Option(k, v)));
    Object.entries(DB.motions).forEach(([k, v]) => ui.motion.add(new Option(k, v)));
    Object.entries(DB.multidoes).forEach(([k, v]) => ui.multi.add(new Option(v, v)));
    [ui.prota, ui.coadj1, ui.coadj2].forEach(sel => {
        sel.add(new Option("-- Vazio --", ""));
        Object.entries(DB.personagens).forEach(([k, v]) => sel.add(new Option(v.nome, k)));
    });
    Object.entries(DB.roteiros).forEach(([k, v]) => ui.roteiro.add(new Option(v[0], k)));
}

ui.nicho.onchange = () => {
    ui.cenario.innerHTML = '<option value="">-- Escolha o Cenário --</option>';
    const n = DB.nichos[ui.nicho.value];
    if(n) {
        ui.cenario.disabled = false;
        Object.keys(n.cenas).forEach(group => {
            let grp = document.createElement('optgroup'); grp.label = group;
            n.cenas[group].forEach(c => {
                const p = c.split('|');
                grp.appendChild(new Option(p[0], p[1]));
            });
            ui.cenario.appendChild(grp);
        });
    }
};

ui.cenario.onchange = () => ui.cenarioTexto.value = ui.cenario.value;

ui.btnGerar.onclick = () => {
    let cast = ""; let audio = ""; let listAtores = [];
    [ui.prota.value, ui.coadj1.value, ui.coadj2.value].forEach((cid, i) => {
        if(cid && DB.personagens[cid]) {
            const p = DB.personagens[cid];
            cast += `ACTOR ${i+1}: ${p.nome} (${p.dna})\n`;
            audio += `VOICE ${i+1} (${p.nome}): ${p.voz}\n`;
            listAtores.push(p);
        }
    });
    if(listAtores.length === 0) listAtores.push({nome: "Personagem", dna: "3D Character", voz: "Voz Base"});

    ui.promptOut.value = `[MEGA STUDIO 46.0 - ENGINE]\nSTYLE: ${ui.estilo.value}\nLOC: ${ui.cenarioTexto.value}\nLENS: ${ui.lente.value}\nMOTION: ${ui.motion.value}\nPOSE: ${ui.pose.value}\n\nCAST:\n${cast}MULTIDÃO: ${ui.multi.value}\n\nAUDIO DESIGN:\n${audio}`;
    
    const scKey = ui.roteiro.value;
    const cenasData = DB.roteiros[scKey] || ["Ação de cenário fluida."];
    let html = "";
    cenasData.forEach((text, i) => {
        const ator = listAtores[i % listAtores.length];
        html += `<div class="cena-bloco"><span class="tag-cena">CENA ${i+1}</span><p><strong>Ação:</strong> ${text}</p><span class="tag-dna">${ator.nome} (${ator.dna})</span><span class="tag-voz">VOICE DESIGN: ${ator.voz}</span></div>`;
    });
    ui.storyboardOut.innerHTML = html;
};

ui.btnCopiar.onclick = () => { ui.promptOut.select(); document.execCommand("copy"); alert("Prompt Copiado!"); };

init();
</script>
</body>
</html>
