<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Genesis — Studio Remotion Lab</title>
  <!-- O resto do <style> e <head> do seu arquivo antigo permanece igual -->
  <!-- ... (mantenha todo o <style> original do ZIP) ... -->
</head>
<body>
  <!-- O HTML do body permanece igual ao original (nodes, canvas, etc.) -->
  <!-- ... (mantenha todo o HTML do body do ZIP) ... -->

  <script>
    // ==================== NOVAS FUNÇÕES DE IMAGEM COM POLLINATIONS ====================
    async function generateImageWithFlux(prompt) {
      if (!prompt || prompt.length < 5) {
        toast('Prompt muito curto');
        return null;
      }
      try {
        const res = await fetch('/api/generate-image', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, model: 'flux' })
        });
        const data = await res.json();
        if (!data.ok || !data.url) throw new Error(data.error || 'Falha na geração');
        toast('Imagem gerada com Flux!');
        return data.url;
      } catch (err) {
        console.error(err);
        toast('Erro ao gerar imagem: ' + err.message);
        return null;
      }
    }

    async function generateImageFromDna() {
      const base = state.visualMemory || state.outputs.dna || state.setup.idea || 'Cena cinematográfica de alta qualidade';
      const prompt = `${base}. Estilo: ${state.setup.tone || 'cinematográfico'}. Alta qualidade, composição profissional.`;
      const url = await generateImageWithFlux(prompt);
      if (url) showImagePreview(url, 'Imagem gerada a partir do DNA Visual');
    }

    async function generateImageFromPrompt() {
      const prompt = document.getElementById('f_prompt')?.value.trim();
      if (!prompt) {
        toast('Escreva um prompt primeiro!');
        return;
      }
      const url = await generateImageWithFlux(prompt);
      if (url) showImagePreview(url, 'Imagem gerada com Flux');
    }

    function showImagePreview(url, title = 'Imagem Gerada') {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999;display:flex;align-items:center;justify-content:center;';
      modal.innerHTML = `
        <div style="max-width:900px;width:95%;background:#0c111d;border-radius:20px;overflow:hidden;border:1px solid #d6ad68;">
          <div style="padding:16px 20px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center;">
            <strong style="color:#f3dfb8;">${title}</strong>
            <button onclick="this.closest('div[style*=\'position:fixed\']').remove()" style="background:none;border:none;color:white;font-size:24px;cursor:pointer;">×</button>
          </div>
          <div style="padding:20px;text-align:center;">
            <img src="${url}" style="max-height:65vh;max-width:100%;border-radius:12px;" />
          </div>
          <div style="padding:16px;display:flex;gap:10px;justify-content:flex-end;background:#111827;">
            <button onclick="window.open('${url}','_blank')" class="btn cyan">Abrir em nova aba</button>
            <button onclick="navigator.clipboard.writeText('${url}'); alert('Link copiado!'); this.closest('div[style*=\'position:fixed\']').remove()" class="btn">Copiar link</button>
            <button onclick="this.closest('div[style*=\'position:fixed\']').remove()" class="btn">Fechar</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    }

    // ==================== ATUALIZAÇÃO DAS ESTAÇÕES ====================
    function dnaStation() {
      return `
        <div class="station-section">
          <h3>DNA Visual + Geração de Imagem</h3>
          <p style="color:#96a1ba;font-size:13px;">Gere a identidade visual e crie imagens reais com Flux.</p>
          <div class="form-grid">
            <div class="field full">
              <label>Memória visual</label>
              <textarea id="f_visualMemory" style="min-height:130px;">${state.visualMemory || ''}</textarea>
            </div>
          </div>
          <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn cyan" onclick="analyzeRefsLocal()">Analisar referências</button>
            <button class="btn gold" onclick="generateDna()">Gerar DNA Visual</button>
            <button class="btn green" onclick="generateImageFromDna()">
              ✨ Gerar Imagem com Flux
            </button>
            <button class="btn purple" onclick="approveActiveNode()">Aprovar</button>
          </div>
        </div>
      `;
    }

    function promptsStation() {
      return `
        <div class="station-section">
          <h3>Prompts IA + Geração de Imagem</h3>
          <textarea id="f_prompt" placeholder="Escreva o prompt para gerar imagem..." style="width:100%;height:140px;background:#111827;color:white;border:1px solid #444;border-radius:10px;padding:12px;"></textarea>
          <div style="margin-top:16px">
            <button class="btn green" onclick="generateImageFromPrompt()">
              ✨ Gerar Imagem com Flux
            </button>
          </div>
        </div>
      `;
    }

    // ==================== O RESTO DO CÓDIGO ANTIGO PERMANECE IGUAL ====================
    // (mantenha todo o resto do <script> original do ZIP)

    // Adicione no final do script, antes de init():
    window.generateImageFromDna = generateImageFromDna;
    window.generateImageFromPrompt = generateImageFromPrompt;
    window.showImagePreview = showImagePreview;

  </script>
</body>
</html>
