<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruits Adventures Studio — MVP</title>
  <style>
    :root {
      --bg: #f6f6f4;
      --card: #ffffff;
      --text: #161616;
      --muted: #666666;
      --line: #deded8;
      --dark: #111111;
      --soft: #eeeeea;
      --accent: #ffcc33;
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-end;
      margin-bottom: 28px;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      padding: 7px 11px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid var(--line);
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 62px);
      letter-spacing: -2px;
      line-height: 0.95;
    }

    .subtitle {
      max-width: 720px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
      margin-top: 16px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 22px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.04);
    }

    .section-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 14px;
      font: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 190px;
      resize: vertical;
      line-height: 1.45;
    }

    .field { margin-bottom: 18px; }

    .mode-list {
      display: grid;
      gap: 10px;
    }

    .mode-card {
      border: 1px solid var(--line);
      background: var(--soft);
      padding: 14px;
      border-radius: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    .mode-card:hover { background: #fff; }

    .mode-card.active {
      background: #fff;
      border-color: var(--dark);
      box-shadow: 0 8px 18px rgba(0,0,0,0.07);
    }

    .mode-card strong { display: block; margin-bottom: 4px; }
    .mode-card span { color: var(--muted); font-size: 14px; line-height: 1.35; }

    .button {
      border: 0;
      border-radius: 17px;
      padding: 14px 18px;
      background: var(--dark);
      color: white;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      font-size: 15px;
    }

    .button:hover { transform: translateY(-1px); opacity: 0.92; }
    .button.secondary { background: var(--soft); color: var(--dark); border: 1px solid var(--line); }
    .button.full { width: 100%; }

    .rule-box {
      background: #fff8d7;
      border: 1px solid #efd675;
      border-radius: 18px;
      padding: 16px;
      line-height: 1.5;
      color: #4b3b00;
      font-weight: 700;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      background: var(--soft);
      padding: 6px;
      border-radius: 18px;
      margin-bottom: 16px;
    }

    .tab {
      padding: 12px 10px;
      border: 0;
      background: transparent;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 800;
      color: #555;
    }

    .tab.active {
      background: white;
      color: var(--dark);
      box-shadow: 0 5px 12px rgba(0,0,0,0.06);
    }

    .content-panel { display: none; }
    .content-panel.active { display: block; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .info-box {
      background: var(--soft);
      border-radius: 18px;
      padding: 16px;
      min-height: 110px;
    }

    .info-box small {
      display: block;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .info-box p { margin: 0; line-height: 1.45; }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .character-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 17px;
    }

    .character-card h3 { margin: 10px 0 8px; font-size: 20px; }
    .character-card p { color: var(--muted); line-height: 1.4; font-size: 14px; }

    .outfit {
      background: var(--soft);
      border-radius: 16px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.4;
      margin: 12px 0;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--dark);
      color: white;
      padding: 18px;
      border-radius: 18px;
      max-height: 520px;
      overflow: auto;
      line-height: 1.45;
      font-size: 14px;
    }

    .storyboard-list {
      display: grid;
      gap: 12px;
    }

    .scene-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .scene-card strong { display: block; margin-bottom: 7px; }
    .scene-card p { margin: 0 0 12px; color: var(--muted); line-height: 1.45; }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: var(--dark);
      color: white;
      border-radius: 16px;
      padding: 13px 16px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: 0.25s;
      font-weight: 800;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      header { flex-direction: column; align-items: flex-start; }
      .main-grid { grid-template-columns: 1fr; }
      .character-grid, .info-grid { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <div class="badge-row">
          <span class="badge">MVP V1</span>
          <span class="badge">Pré-produção IA</span>
          <span class="badge">Model sheet primeiro</span>
        </div>
        <h1>Fruits Adventures Studio</h1>
        <p class="subtitle">Motor simples para transformar vídeo, ideia ou universo em história, personagens, model sheets, storyboard e prompts finais sem misturar projetos.</p>
      </div>
      <div class="top-actions">
        <button class="button" onclick="generatePackage()">Gerar pacote</button>
        <button class="button secondary" onclick="exportProject()">Exportar JSON</button>
      </div>
    </header>

    <div class="main-grid">
      <aside class="card">
        <h2 class="section-title">🎬 Entrada do projeto</h2>

        <div class="field">
          <label for="projectTitle">Nome do projeto</label>
          <input id="projectTitle" value="Projeto 001 — Referência Viral" />
        </div>

        <div class="field">
          <label>Tipo de criação</label>
          <div class="mode-list" id="modeList"></div>
        </div>

        <div class="field">
          <label for="sourceText">Vídeo, ideia ou resumo</label>
          <textarea id="sourceText">Uma banana adulta humilde é humilhada por um personagem rico. Ela tenta cuidar de uma criança, passa por chuva, rejeição e dificuldade, mas encontra uma pequena esperança no final.</textarea>
        </div>

        <button class="button full" onclick="generatePackage()">Analisar agora</button>
      </aside>

      <main>
        <section class="card" style="margin-bottom: 18px;">
          <h2 class="section-title">✅ Regra anti-bagunça</h2>
          <div class="rule-box" id="ruleBox"></div>
        </section>

        <div class="tabs">
          <button class="tab active" onclick="openTab('historia')">História</button>
          <button class="tab" onclick="openTab('personagens')">Personagens</button>
          <button class="tab" onclick="openTab('modelsheet')">Model sheet</button>
          <button class="tab" onclick="openTab('storyboard')">Storyboard</button>
        </div>

        <section id="historia" class="content-panel active card"></section>
        <section id="personagens" class="content-panel card"></section>
        <section id="modelsheet" class="content-panel card"></section>
        <section id="storyboard" class="content-panel card"></section>
      </main>
    </div>
  </div>

  <div id="toast" class="toast">Copiado</div>

  <script>
    const modes = [
      { id: "viral", label: "Vídeo viral", desc: "Extrair história e personagens sem misturar universos." },
      { id: "original", label: "História original", desc: "Criar projeto novo do zero." },
      { id: "universe", label: "Universo próprio", desc: "Usar personagens oficiais aprovados." },
      { id: "adapt", label: "Adaptação", desc: "Transformar referência viral no seu universo." }
    ];

    let state = {
      mode: "viral",
      selectedCharacter: 0,
      analysis: null
    };

    function renderModes() {
      const list = document.getElementById("modeList");
      list.innerHTML = modes.map(mode => `
        <div class="mode-card ${state.mode === mode.id ? 'active' : ''}" onclick="setMode('${mode.id}')">
          <strong>${mode.label}</strong>
          <span>${mode.desc}</span>
        </div>
      `).join("");
    }

    function setMode(mode) {
      state.mode = mode;
      renderModes();
      generatePackage();
    }

    function analyzeProject() {
      const sourceText = document.getElementById("sourceText").value.trim();

      const rules = {
        viral: "Este projeto é uma referência externa. Não usar Tomate Elinaldo, Sabrina Pitaya ou OZ automaticamente.",
        original: "Este projeto é original. Criar personagens próprios desta história e salvar tudo separado.",
        universe: "Este projeto usa um universo autoral. Somente personagens oficiais aprovados podem entrar.",
        adapt: "Este projeto é adaptação. Primeiro extrair a estrutura viral; depois escolher personagens do universo."
      };

      return {
        sourceText,
        rule: rules[state.mode],
        story: {
          logline: "Um personagem humilde enfrenta rejeição social, protege uma criança vulnerável e encontra uma pequena esperança depois de passar por sofrimento.",
          theme: "desigualdade, humilhação, cuidado, sobrevivência, esperança",
          tone: "dramático, sentimental, simples, viral e visualmente claro",
          conflict: "pobreza e vulnerabilidade contra poder, riqueza e indiferença"
        },
        characters: [
          {
            name: "Protagonista humilde",
            role: "protagonista",
            identity: "Personagem fruta adulto, aparência cansada, sensível e pobre.",
            baseOutfit: "regata branca velha, bermuda jeans azul curta, chinelo simples",
            expressions: ["neutro", "triste", "preocupado", "assustado", "esperançoso", "aliviado"],
            outfitStates: ["limpa", "suja", "molhada", "rasgada", "muito danificada"]
          },
          {
            name: "Personagem rico",
            role: "contraste social / antagonista",
            identity: "Personagem fruta ou vegetal elegante, confiante, arrogante e superior.",
            baseOutfit: "terno elegante, camisa branca, gravata escura, sapato social",
            expressions: ["neutro", "confiante", "debochado", "bravo", "desconfiado", "surpreso"],
            outfitStates: ["limpa", "levemente suja", "molhada", "rasgada", "danificada"]
          },
          {
            name: "Criança emocional",
            role: "carga emocional",
            identity: "Criança pequena, inocente, vulnerável, olhos grandes e expressivos.",
            baseOutfit: "roupa infantil simples, confortável e humilde",
            expressions: ["neutra", "triste", "curiosa", "assustada", "esperançosa", "feliz simples"],
            outfitStates: ["limpa", "suja", "molhada", "rasgada"]
          }
        ],
        storyboard: [
          "Contraste social: protagonista humilde observa o personagem rico em ambiente bonito.",
          "Humilhação: personagem rico rejeita o protagonista, que abaixa a cabeça.",
          "Criança esperando: protagonista encontra a criança vulnerável precisando de ajuda.",
          "Chuva e sofrimento: protagonista anda molhado, cansado e preocupado.",
          "Queda emocional: ele perde algo importante ou percebe que não consegue resolver o problema.",
          "Pequena esperança: recebe ajuda ou encontra solução simples, com expressão de alívio."
        ]
      };
    }

    function generatePackage() {
      state.analysis = analyzeProject();
      renderAll();
    }

    function renderAll() {
      document.getElementById("ruleBox").textContent = state.analysis.rule;
      renderStory();
      renderCharacters();
      renderModelSheet();
      renderStoryboard();
    }

    function renderStory() {
      const s = state.analysis.story;
      document.getElementById("historia").innerHTML = `
        <h2 class="section-title">📄 História detectada</h2>
        <div class="info-grid">
          ${infoBox("Logline", s.logline)}
          ${infoBox("Conflito", s.conflict)}
          ${infoBox("Tema", s.theme)}
          ${infoBox("Tom", s.tone)}
        </div>
      `;
    }

    function renderCharacters() {
      document.getElementById("personagens").innerHTML = `
        <h2 class="section-title">👤 Personagens detectados</h2>
        <div class="character-grid">
          ${state.analysis.characters.map((c, index) => `
            <div class="character-card">
              <span class="badge">${c.role}</span>
              <h3>${c.name}</h3>
              <p>${c.identity}</p>
              <div class="outfit"><strong>Roupa base:</strong><br>${c.baseOutfit}</div>
              <button class="button secondary full" onclick="selectCharacter(${index})">Abrir model sheet</button>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderModelSheet() {
      const c = state.analysis.characters[state.selectedCharacter];
      const prompt = buildModelSheetPrompt(c);
      document.getElementById("modelsheet").innerHTML = `
        <h2 class="section-title">🧩 Prompt de model sheet</h2>
        <div class="field">
          <label>Personagem</label>
          <select onchange="selectCharacter(Number(this.value))">
            ${state.analysis.characters.map((char, index) => `<option value="${index}" ${index === state.selectedCharacter ? 'selected' : ''}>${char.name}</option>`).join("")}
          </select>
        </div>
        <pre>${escapeHtml(prompt)}</pre>
        <button class="button" onclick="copyText(\`${escapeBacktick(prompt)}\`)">Copiar prompt</button>
      `;
    }

    function renderStoryboard() {
      document.getElementById("storyboard").innerHTML = `
        <h2 class="section-title">🎞️ Storyboard base</h2>
        <div class="storyboard-list">
          ${state.analysis.storyboard.map((scene, index) => {
            const prompt = buildScenePrompt(scene, index);
            return `
              <div class="scene-card">
                <strong>Cena ${index + 1}</strong>
                <p>${scene}</p>
                <button class="button secondary" onclick="copyText(\`${escapeBacktick(prompt)}\`)">Copiar prompt da cena</button>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function selectCharacter(index) {
      state.selectedCharacter = index;
      openTab("modelsheet");
      renderModelSheet();
    }

    function infoBox(title, text) {
      return `<div class="info-box"><small>${title}</small><p>${text}</p></div>`;
    }

    function buildModelSheetPrompt(character) {
      return `Crie um model sheet profissional de ${character.name} em uma única imagem.\n\nMostrar o mesmo personagem em corpo inteiro, com variações consistentes do mesmo personagem.\n\nIdentidade do personagem:\n${character.identity}\n\nRoupa base oficial:\n${character.baseOutfit}.\n\nExpressões:\n${character.expressions.map((x, i) => `${i + 1}. ${x}`).join("\n")}\n\nEstados da roupa:\n${character.outfitStates.map((x, i) => `${i + 1}. roupa ${x}`).join("\n")}\n\nImportante:\nManter sempre o mesmo personagem.\nManter sempre a mesma roupa base.\nNão trocar figurino.\nSem sangue.\nSem gore.\nApenas sujeira, desgaste, rasgos leves, chuva e dano visual na roupa.\nFundo cinza neutro.\nEstilo animação 3D cinematográfica.\nOrganizado como folha de referência visual.`;
    }

    function buildScenePrompt(scene, index) {
      return `Cena ${index + 1}: ${scene}\n\nUsar somente personagens aprovados deste projeto. Manter a roupa base definida no model sheet. Não trocar figurino. A roupa pode mudar apenas de estado conforme continuidade: limpa, suja, molhada, rasgada ou danificada. Sem sangue e sem gore. Estilo animação 3D cinematográfica, composição clara, emoção forte, visual de curta viral.`;
    }

    function openTab(tabId) {
      document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
      document.querySelectorAll(".content-panel").forEach(panel => panel.classList.remove("active"));
      document.querySelector(`.tab[onclick="openTab('${tabId}')"]`).classList.add("active");
      document.getElementById(tabId).classList.add("active");
    }

    async function copyText(text) {
      await navigator.clipboard.writeText(text);
      const toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1300);
    }

    function exportProject() {
      const project = {
        title: document.getElementById("projectTitle").value,
        mode: state.mode,
        sourceText: document.getElementById("sourceText").value,
        analysis: state.analysis
      };
      const blob = new Blob([JSON.stringify(project, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "fruits-adventures-studio-projeto.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeBacktick(str) {
      return String(str).replaceAll("`", "\\`").replaceAll("${", "\\${");
    }

    renderModes();
    generatePackage();
  </script>
</body>
</html>
