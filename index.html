<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Genesis — Studio</title>
  <style>
    :root {
      --bg: #05070d;
      --gold: #d6ad68;
      --cyan: #65d9d2;
      --green: #75db9b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #05070d;
      color: #e8edf8;
      font-family: Inter, system-ui, sans-serif;
    }
    .app { height: 100vh; display: flex; flex-direction: column; }
    
    .topbar {
      height: 64px;
      background: #0c111d;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(145deg, #f6d681, #d8a94f);
      display: grid; place-items: center;
      font-weight: 900; color: #1a1203; font-size: 20px;
    }

    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .left-dock {
      width: 260px;
      background: #0c111d;
      border-right: 1px solid #222;
      padding: 16px;
      overflow-y: auto;
    }

    .canvas-wrap {
      flex: 1;
      position: relative;
      background: #050813;
      overflow: hidden;
    }

    .canvas-map {
      position: absolute;
      width: 3000px;
      height: 2000px;
      transform-origin: 0 0;
    }

    .node {
      position: absolute;
      width: 240px;
      background: #0c111d;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .node.active { border-color: #d6ad68; }

    .right-dock {
      width: 280px;
      background: #0c111d;
      border-left: 1px solid #222;
      padding: 16px;
    }

    .btn {
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #111827;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }
    .btn.green { background: #1f3a2f; border-color: #75db9b; color: #75db9b; }
    .btn.gold { background: #3a2f1f; border-color: #d6ad68; color: #d6ad68; }

    .station {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 900px;
      background: #0c111d;
      border: 1px solid #d6ad68;
      border-radius: 20px;
      z-index: 100;
      display: none;
    }
    .station.active { display: block; }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #111827;
      color: #f3dfb8;
      padding: 12px 18px;
      border-radius: 12px;
      border: 1px solid #d6ad68;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Topbar -->
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">PG</div>
        <div>
          <strong>Portal Genesis Studio</strong>
        </div>
      </div>
      <div style="margin-left: auto; display: flex; gap: 8px;">
        <button class="btn" onclick="openStation('brief')">Abrir Briefing</button>
        <button class="btn gold" onclick="generatePipeline()">Gerar Pipeline</button>
        <button class="btn" onclick="resetProject()">Reset</button>
      </div>
    </div>

    <div class="workspace">
      <!-- Left -->
      <div class="left-dock">
        <h4 style="margin-top:0; color:#d6ad68">Pipeline</h4>
        <div id="nodeList"></div>
      </div>

      <!-- Canvas -->
      <div class="canvas-wrap" id="canvasWrap">
        <div class="canvas-map" id="canvasMap">
          <div id="nodeLayer"></div>
        </div>
      </div>

      <!-- Right -->
      <div class="right-dock">
        <h4 style="color:#d6ad68">Diagnóstico</h4>
        <div id="diagnostics"></div>
      </div>
    </div>
  </div>

  <!-- Station -->
  <div class="station" id="station">
    <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
      <h3 id="stationTitle" style="margin:0; color:#f3dfb8"></h3>
      <button onclick="closeStation()" style="background:none;border:none;color:white;font-size:22px;">×</button>
    </div>
    <div id="stationMain" style="padding:20px;"></div>
  </div>

  <script>
    const STORAGE_KEY = 'pg_studio_v1';
    let state = {
      activeNode: 'brief',
      visualMemory: '',
      refs: [],
      outputs: {}
    };

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) state = { ...state, ...JSON.parse(saved) };
    }
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function toast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2800);
    }

    // ==================== GERAÇÃO DE IMAGEM ====================
    async function generateImageWithFlux(prompt, referenceUrl = null) {
      try {
        const res = await fetch('/api/generate-image-fal', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt,
            model: 'flux-pro',
            referenceImage: referenceUrl,
            strength: 0.7
          })
        });
        const data = await res.json();
        if (!data.ok || !data.url) throw new Error(data.error || 'Erro');
        return data.url;
      } catch (e) {
        toast('Erro ao gerar imagem: ' + e.message);
        return null;
      }
    }

    async function generateImageFromDna() {
      const prompt = state.visualMemory || 'Cena cinematográfica de alta qualidade, estilo profissional';
      const ref = state.refs[0] || null;
      
      const url = await generateImageWithFlux(prompt, ref);
      if (url) {
        showImagePreview(url);
      }
    }

    function showImagePreview(url) {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:999;display:flex;align-items:center;justify-content:center;';
      modal.innerHTML = `
        <div style="max-width:860px;width:95%;background:#0c111d;border-radius:16px;overflow:hidden;">
          <div style="padding:16px 20px;border-bottom:1px solid #333;display:flex;justify-content:space-between;">
            <strong style="color:#f3dfb8">Imagem Gerada com Flux</strong>
            <span onclick="this.closest('div[style*=\'position:fixed\']').remove()" style="cursor:pointer;font-size:22px">×</span>
          </div>
          <div style="padding:20px;text-align:center">
            <img src="${url}" style="max-height:60vh;border-radius:12px;max-width:100%">
          </div>
          <div style="padding:16px;display:flex;gap:10px;justify-content:flex-end;background:#111827">
            <button class="btn" onclick="window.open('${url}','_blank')">Abrir</button>
            <button class="btn" onclick="navigator.clipboard.writeText('${url}'); alert('Link copiado!')">Copiar Link</button>
            <button class="btn" onclick="this.closest('div[style*=\'position:fixed\']').remove()">Fechar</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
    }

    // ==================== STATION ====================
    function openStation(id) {
      state.activeNode = id;
      const station = document.getElementById('station');
      const main = document.getElementById('stationMain');
      document.getElementById('stationTitle').textContent = id.toUpperCase();

      if (id === 'dna') {
        main.innerHTML = `
          <div>
            <h4>DNA Visual</h4>
            <textarea id="f_visualMemory" style="width:100%;height:120px;background:#111827;color:white;border:1px solid #444;border-radius:10px;padding:12px;">${state.visualMemory || ''}</textarea>
            
            <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
              <button class="btn gold" onclick="generateDna()">Gerar DNA</button>
              <button class="btn green" onclick="generateImageFromDna()">
                ✨ Gerar Imagem com Flux
              </button>
            </div>
          </div>
        `;
      } else {
        main.innerHTML = `<p>Node: <strong>${id}</strong> (em desenvolvimento)</p>`;
      }

      station.style.display = 'block';
    }

    function closeStation() {
      document.getElementById('station').style.display = 'none';
    }

    function generateDna() {
      const val = document.getElementById('f_visualMemory').value;
      state.visualMemory = val;
      saveState();
      toast('DNA Visual salvo!');
    }

    function generatePipeline() {
      toast('Pipeline gerado (simulado)');
    }

    function resetProject() {
      if (confirm('Resetar projeto?')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
    }

    function init() {
      loadState();
      
      // Renderizar nodes básicos no canvas
      const layer = document.getElementById('nodeLayer');
      const nodes = [
        { id: 'brief', title: 'Briefing', x: 80, y: 120 },
        { id: 'dna', title: 'DNA Visual', x: 400, y: 120 },
        { id: 'prompts', title: 'Prompts IA', x: 720, y: 120 }
      ];

      nodes.forEach(n => {
        const el = document.createElement('div');
        el.className = 'node';
        el.style.left = n.x + 'px';
        el.style.top = n.y + 'px';
        el.innerHTML = `
          <div style="font-weight:700;margin-bottom:6px">${n.title}</div>
          <button class="btn" onclick="openStation('${n.id}')">Abrir</button>
        `;
        layer.appendChild(el);
      });

      console.log('%c[Portal Genesis] Studio carregado com Flux', 'color:#75db9b');
      toast('Studio pronto! Clique em DNA Visual para gerar imagens.');
    }

    window.generateImageFromDna = generateImageFromDna;
    init();
  </script>
</body>
</html>
